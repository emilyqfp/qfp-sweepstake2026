const norm=n=>NAME_MAP[n]||n;
const getFlag=n=>FLAGS[norm(n)]||FLAGS[n]||'🏳';
function getOwner(name){const n=norm(name).toLowerCase().trim();for(const e of SWEEPSTAKE)for(const t of e.teams)if(t.toLowerCase()===n)return e.owner;return null;}
const isMyTeam=n=>MY_TEAMS.some(t=>t.toLowerCase()===norm(n).toLowerCase());
const todayStr=()=>new Date().toISOString().split('T')[0];
const friendlyDate=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
const localTime=u=>new Date(u).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const stageLabel=s=>STAGE_MAP[s]||s||'Group Stage';

// Merge live scores into base matches by team names
function mergeLiveData(liveMatches){
  const merged=JSON.parse(JSON.stringify(BASE_MATCHES));
  for(const live of liveMatches){
    const idx=merged.findIndex(b=>
      b.date===live.date&&
      (b.team1.toLowerCase()===live.team1.toLowerCase()||b.team2.toLowerCase()===live.team1.toLowerCase())&&
      (b.team1.toLowerCase()===live.team2.toLowerCase()||b.team2.toLowerCase()===live.team2.toLowerCase())
    );
    if(idx>=0){
      merged[idx].score1=live.score1;
      merged[idx].score2=live.score2;
      merged[idx].status=live.status;
      merged[idx].minute=live.minute;
    }
  }
  // Also add any knockout matches from live data that are TBD in base
  for(const live of liveMatches){
    if(live.team1!=='TBD'&&live.team2!=='TBD'){
      const exists=merged.some(b=>b.date===live.date&&b.team1===live.team1&&b.team2===live.team2);
      if(!exists){
        const tbdIdx=merged.findIndex(b=>b.date===live.date&&b.team1==='TBD'&&b.stage===live.stage);
        if(tbdIdx>=0){merged[tbdIdx].team1=live.team1;merged[tbdIdx].team2=live.team2;merged[tbdIdx].score1=live.score1;merged[tbdIdx].score2=live.score2;merged[tbdIdx].status=live.status;}
      }
    }
  }
  return merged;
}

async function fetchMatches(){
  // Try TheSportsDB first (free, no key, CORS open)
  const urls=[
    'https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=5765&s=2026',
    'https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=5765&s=2025-2026'
  ];
  for(const url of urls){
    try{
      const res=await fetch(url);if(!res.ok)continue;
      const data=await res.json();
      const events=data.events||data.event;
      if(!events||!events.length)continue;
      const live=events.map(e=>({
        date:e.dateEvent,utcDate:e.dateEvent+'T'+(e.strTime||'18:00:00'),
        stage:e.strRound||'Group Stage',
        team1:norm(e.strHomeTeam||'TBD'),team2:norm(e.strAwayTeam||'TBD'),
        score1:e.intHomeScore!=null&&e.intHomeScore!==''?parseInt(e.intHomeScore):null,
        score2:e.intAwayScore!=null&&e.intAwayScore!==''?parseInt(e.intAwayScore):null,
        status:e.strStatus==='Match Finished'?'finished':e.strStatus==='In Progress'?'live':'scheduled'
      })).filter(m=>m.date>='2026-06-01');
      if(!live.length)continue;
      allMatches=mergeLiveData(live);
      usingLiveData=true;lastRefreshed=new Date();return;
    }catch(e){continue;}
  }
  // Try football-data.org via CORS proxy
  try{
    const res=await fetch('/api/matches');
    if(res.ok){
      const data=await res.json();
      if(data.matches&&data.matches.length){
        const live=data.matches.map(m=>({
          date:m.utcDate.split('T')[0],utcDate:m.utcDate,stage:stageLabel(m.stage),
          team1:norm(m.homeTeam.name||'TBD'),team2:norm(m.awayTeam.name||'TBD'),
          score1:m.score&&m.score.fullTime?m.score.fullTime.home:null,
          score2:m.score&&m.score.fullTime?m.score.fullTime.away:null,
          status:m.status==='FINISHED'?'finished':(m.status==='IN_PLAY'||m.status==='PAUSED')?'live':'scheduled',
          minute:m.minute||null
        }));
        allMatches=mergeLiveData(live);
        usingLiveData=true;lastRefreshed=new Date();return;
      }
    }
  }catch(e){}
  usingLiveData=false;lastRefreshed=new Date();
  allMatches=JSON.parse(JSON.stringify(BASE_MATCHES));
}

function calcLeaderboard(){
  const pts={},w={},d={},l={},elim={};
  for(const e of SWEEPSTAKE){pts[e.owner]=0;w[e.owner]=0;d[e.owner]=0;l[e.owner]=0;}
  for(const m of allMatches){
    if(m.status!=='finished'||m.score1===null||m.score2===null)continue;
    const o1=getOwner(m.team1),o2=getOwner(m.team2);
    if(m.score1>m.score2){if(o1){pts[o1]+=3;w[o1]++;}if(o2){l[o2]++;elim[m.team2]=true;}}
    else if(m.score2>m.score1){if(o2){pts[o2]+=3;w[o2]++;}if(o1){l[o1]++;elim[m.team1]=true;}}
    else{if(o1){pts[o1]++;d[o1]++;}if(o2){pts[o2]++;d[o2]++;}}
  }
  return SWEEPSTAKE.map(e=>({owner:e.owner,teams:e.teams,pts:pts[e.owner]||0,wins:w[e.owner]||0,draws:d[e.owner]||0,losses:l[e.owner]||0,elim})).sort((a,b)=>b.pts-a.pts||b.wins-a.wins);
}

function statusBar(){
  const t=lastRefreshed?lastRefreshed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
  return usingLiveData
    ?`<div class="sb ok">✅ Live scores connected — ${allMatches.length} matches loaded. Updated ${t}</div>`
    :`<div class="sb warn">📋 Showing full schedule (${allMatches.length} matches). Live scores will appear once the API connects — hit Refresh to try again.</div>`;
}

function renderMatches(){
  const today=todayStr();
  let matches=activeStage==='all'?allMatches.slice():allMatches.filter(m=>m.stage===activeStage);
  const byDate={};
  for(const m of matches){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  const dates=Object.keys(byDate).sort();
  const stages=['all','Group Stage','Round of 32','Round of 16','Quarter-finals','Semi-finals','Third-place','Final'];
  const upd=lastRefreshed?lastRefreshed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
  let h=statusBar();
  h+=`<div class="sl"><span>${allMatches.length} matches — full tournament</span><span>${upd?'Updated '+upd:''}</span></div>`;
  h+=`<div class="fr">${stages.map(s=>`<button class="fp ${activeStage===s?'active':''}" onclick="filterStage('${s}')">${s==='all'?'All stages':s}</button>`).join('')}</div>`;
  for(const date of dates){
    const ms=byDate[date];
    const isToday=date===today;
    const hasLive=ms.some(m=>m.status==='live');
    h+=`<div class="card ${isToday?'tc':''}"><div class="ch">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        ${isToday?'<span class="tp">Today</span>':''}
        <span class="cd">${friendlyDate(date)}</span>
        ${hasLive?'<span class="chip cl">● Live now</span>':''}
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <span class="st">${ms[0]?.stage||''}</span>
        <span style="font-size:11px;color:var(--light)">${ms.length} match${ms.length!==1?'es':''}</span>
      </div></div>`;
    for(const m of ms){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const isClash=o1&&o2&&o1!==o2;
      const myMatch=isMyTeam(m.team1)||isMyTeam(m.team2);
      const timeStr=m.utcDate?localTime(m.utcDate):'TBC';
      let sh;
      if(m.status==='live')sh=`<span class="sc live">${m.score1??0}–${m.score2??0}</span><span class="chip cl">${m.minute?m.minute+"'":'Live'}</span>`;
      else if(m.status==='finished')sh=`<span class="sc">${m.score1??0}–${m.score2??0}</span><span class="chip cf">FT</span>`;
      else sh=`<span class="sc sch">${timeStr}</span>`;
      h+=`<div class="mr ${myMatch?'mm':''}">
        <div class="mts"><span class="fl">${getFlag(m.team1)}</span><span class="tn ${isMyTeam(m.team1)?'mine':''}">${m.team1}</span><span class="vs">vs</span><span class="tn ${isMyTeam(m.team2)?'mine':''}">${m.team2}</span><span class="fl">${getFlag(m.team2)}</span></div>
        <div class="mri">${sh}${isClash?`<span class="chip cl">⚔ ${o1} vs ${o2}</span>`:''}</div>
      </div>`;
      if(o1||o2)h+=`<div class="or">${o1?`<span class="ot2 ${o1===ME?'mine':''}">${getFlag(m.team1)} ${o1===ME?'You — '+m.team1:o1+' — '+m.team1}</span>`:''}${o2?`<span class="ot2 ${o2===ME?'mine':''}">${getFlag(m.team2)} ${o2===ME?'You — '+m.team2:o2+' — '+m.team2}</span>`:''}</div>`;
    }
    h+='</div>';
  }
  document.getElementById('tab-matches').innerHTML=h;
}

    pundit:()=>{let msg=`*QFP World Cup Bulletin* ⚽\n\n`;if(todayMs.length)msg+=`*Today\'s fixtures:*\n${matchList}\n\n`;else msg+=`No fixtures today. A day to reflect.\n\n`;if(clashesToday.length){const m=clashesToday[0];msg+=`*The standout clash:* ${getOwner(m.team1)} versus ${getOwner(m.team2)} — ${m.team1} against ${m.team2}. One goes home disappointed.\n\n`;}if(recentMs.length)msg+=`*Recent results:* ${recentList}\n\n`;msg+=`*Standings:* ${top.owner} leads on ${top.pts} points.`;if(myRank>0)msg+=` Emily — Morocco, Paraguay, Tunisia — sits at #${myRank}.`;return msg;},
    hype:()=>{let msg=`🚨🚨 QFP WORLD CUP UPDATE 🚨🚨\n\n`;if(todayMs.length)msg+=`TODAY\'S MATCHES:\n${matchList}\n\nTHIS IS MASSIVE.\n\n`;else msg+=`No matches today but THE TENSION IS BUILDING!!! 😤\n\n`;if(clashesToday.length){msg+=`⚔️ COLLEAGUE CLASH!!! ⚔️\n`;for(const m of clashesToday){msg+=`${getOwner(m.team1).toUpperCase()} VS ${getOwner(m.team2).toUpperCase()}!!! UNBELIEVABLE!!!\n`;}msg+='\n';}if(myMs.length)msg+=`EMILY\'S TEAMS IN ACTION TODAY! 🇲🇦 MOROCCO! PARAGUAY! TUNISIA! ANYTHING IS POSSIBLE!!!\n\n`;if(recentMs.length)msg+=`RECENT RESULTS: ${recentList}\n\n`;msg+=`LEADERBOARD: ${top.owner} ON ${top.pts}PTS!!! 🏆🔥`;return msg;},
    chaos:()=>{const intros=['Good morning. The World Cup is happening. Are we okay with this?','Another day, another football. I have eaten breakfast. The sweepstake continues.','Football update: the ball is still round. Everything is fine.'];let msg=pick(intros)+'\n\n';if(todayMs.length)msg+=`Matches today (allegedly):\n${matchList}\n\nWill these be good? Statistics suggest: possibly.\n\n`;if(clashesToday.length){const m=clashesToday[0];msg+=`${getOwner(m.team1)} and ${getOwner(m.team2)} are playing each other which is either very exciting or completely irrelevant. It is both.\n\n`;}if(myMs.length)msg+=`Emily has teams playing today. She seems optimistic about Morocco which is either brave or delusional — probably both.\n\n`;if(recentMs.length)msg+=`Things that happened: ${recentList}. These are facts.\n\n`;msg+=`${top.owner} leads the sweepstake. This may or may not continue. Good luck everyone.`;return msg;}
  };
  generatedBulletin=gen[activeTone]();
  const el=document.getElementById('bb');el.classList.remove('ph');el.textContent=generatedBulletin;
}

function copyBulletin(){if(!generatedBulletin)return;navigator.clipboard.writeText(generatedBulletin).then(()=>{const btn=document.getElementById('cb');btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2500);});}

function renderMyTeams(){
  let h=`<div class="sl" style="margin-bottom:12px">Your teams, Emily</div><div class="mtg">`;
  for(const team of MY_TEAMS){
    const tms=allMatches.filter(m=>m.team1.toLowerCase()===team.toLowerCase()||m.team2.toLowerCase()===team.toLowerCase());
    const fin=tms.filter(m=>m.status==='finished');
    const ww=fin.filter(m=>{const t1=m.team1.toLowerCase()===team.toLowerCase();return t1?m.score1>m.score2:m.score2>m.score1;}).length;
    const dd=fin.filter(m=>m.score1===m.score2).length;
    const ll=fin.length-ww-dd;
    h+=`<div class="tcd"><div class="tct"><span class="tfb">${getFlag(team)}</span><div class="tcn">${team}</div><div class="tcp">${ww*3+dd}pts · ${ww}W ${dd}D ${ll}L</div></div>`;
    if(!tms.length)h+=`<div class="tm"><span style="color:var(--faint)">No fixtures found</span></div>`;
    for(const m of tms){
      const isT1=m.team1.toLowerCase()===team.toLowerCase();const opp=isT1?m.team2:m.team1;
      let result='',cls='s';
      if(m.status==='finished'){const myS=isT1?m.score1:m.score2,oppS=isT1?m.score2:m.score1;result=myS>oppS?'W':myS<oppS?'L':'D';cls=result==='W'?'w':result==='L'?'l':'d';result=`${result} ${m.score1}–${m.score2}`;}
      else if(m.status==='live'){result=`🔴 ${m.score1}–${m.score2}`;cls='w';}
      else{result=m.utcDate?localTime(m.utcDate):'TBC';}
      h+=`<div class="tm"><span class="tmd">${m.date.slice(5)}</span><span class="tmo">${getFlag(opp)} vs ${opp}</span><span class="tmr ${cls}">${result}</span></div>`;
    }
    h+='</div>';
  }
  h+=`</div><div class="sl" style="margin-bottom:12px">All 17 participants</div><div class="card">`;
  for(const e of SWEEPSTAKE)h+=`<div class="lr"><span class="ln ${e.owner===ME?'me':''}" style="min-width:90px;flex-shrink:0">${e.owner===ME?'You':e.owner}</span><div class="lt">${e.teams.map(t=>`<span class="ltt">${getFlag(t)} ${t}</span>`).join('')}</div></div>`;
  h+='</div>';
  document.getElementById('tab-myteams').innerHTML=h;
}

function showTab(id,btn){document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');document.querySelectorAll('.tb').forEach(el=>el.classList.remove('active'));document.getElementById('tab-'+id).style.display='';btn.classList.add('active');if(id==='leaderboard')renderLeaderboard();if(id==='bulletin')renderBulletin();if(id==='myteams')renderMyTeams();}
function filterStage(s){activeStage=s;renderMatches();}
async function refreshAll(){const spin=document.getElementById('spin');spin.classList.add('go');await fetchMatches();renderMatches();const active=document.querySelector('.tb.active').textContent.toLowerCase();if(active.includes('leader'))renderLeaderboard();if(active.includes('team'))renderMyTeams();spin.classList.remove('go');}
async function init(){await fetchMatches();renderMatches();setInterval(refreshAll,90000);}
init();
</script>
