<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QFP World Cup 2026 Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--orange:#FF5600;--ot:#FFF5F0;--ob:#FFD4C0;--gg-dark:#3A5D4F;--gg-mid:#95B1AC;--gg-light:#B8C8C5;--gg-tint:#EBF0EF;--dark:#333333;--mid:#4D4D4D;--muted:#7D8784;--faint:#BCC1C1;--bg:#F2F2F2;--surface:#FFFFFF;--subtle:#ECECEC;--border:#D8DFDE;--bl:#ECECEC;--font:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;--r:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--gg-dark);border-bottom:3px solid var(--orange);padding:0 20px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;height:58px}
.logo-svg{height:32px;width:auto}
.header-right{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--orange);color:var(--orange);font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 9px;border-radius:20px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.rb{display:flex;align-items:center;gap:4px;font-family:var(--font);font-size:11px;font-weight:600;color:var(--gg-light);background:none;border:1px solid rgba(149,177,172,0.4);border-radius:6px;padding:4px 10px;cursor:pointer}
.spin{display:inline-block}
.spin.go{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{background:var(--gg-dark);border-bottom:1px solid rgba(149,177,172,0.2);display:flex;padding:0 20px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tb{font-family:var(--font);font-size:11px;font-weight:600;color:var(--gg-light);background:none;border:none;border-bottom:2px solid transparent;padding:12px 14px;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.tb:hover{color:white}
.tb.active{color:white;border-bottom-color:var(--gg-light)}
.main{max-width:720px;margin:0 auto;padding:16px 16px 60px}
.sb{font-size:11px;font-weight:600;padding:8px 12px;border-radius:6px;margin-bottom:14px}
.sb.ok{background:var(--gg-tint);color:var(--gg-dark);border:1px solid var(--gg-light)}
.sb.warn{background:#FFF8E1;color:#7D5A00;border:1px solid #FFE082}
.sl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.ch{padding:11px 14px;border-bottom:1px solid var(--bl);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.cd{font-size:13px;font-weight:700;color:var(--dark)}
.today-card{border-color:var(--gg-dark);border-width:2px}
.today-pill{background:var(--gg-dark);color:white;font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 8px;border-radius:20px;text-transform:uppercase;margin-right:5px}
.mr{padding:10px 14px;border-bottom:1px solid var(--bl);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mr:last-child{border-bottom:none}
.mts{flex:1;display:flex;align-items:center;gap:6px;min-width:180px}
.fl{font-size:17px;flex-shrink:0;line-height:1}
.tn{font-size:13px;font-weight:500;color:var(--dark)}
.vs{font-size:10px;color:var(--faint);font-weight:400}
.mri{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.sc{background:var(--subtle);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:14px;font-weight:700;color:var(--dark);min-width:50px;text-align:center;font-variant-numeric:tabular-nums}
.sc.live{border-color:var(--orange);color:var(--orange);background:var(--ot)}
.sc.sch{font-size:11px;color:var(--muted);font-weight:500}
.chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap}
.chip-live{background:var(--ot);color:var(--orange);border:1px solid var(--ob)}
.chip-ft{background:var(--gg-tint);color:var(--gg-dark)}
.chip-clash{background:var(--gg-tint);color:var(--gg-dark);border:1px solid var(--gg-light)}
.or{padding:3px 14px 8px;display:flex;gap:4px;flex-wrap:wrap}
.ot2{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--subtle);color:var(--muted);border:1px solid var(--border)}
.fp{font-family:var(--font);font-size:10px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.fp.active{background:var(--gg-dark);border-color:var(--gg-dark);color:white}
.sr{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sx{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.sn{font-size:22px;font-weight:800;color:var(--dark);line-height:1}
.sn.ac{color:var(--gg-dark)}
.sl2{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.lr{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bl)}
.lr:last-child{border-bottom:none}
.lrk{font-size:15px;min-width:26px;padding-top:1px}
.li{flex:1;min-width:0}
.ln{font-size:13px;font-weight:700;color:var(--dark)}
.lrec{font-size:10px;color:var(--faint);margin-top:1px;margin-bottom:4px}
.lt{display:flex;gap:4px;flex-wrap:wrap}
.ltt{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--gg-tint);color:var(--gg-dark);border:1px solid var(--gg-light)}
.ltt.out{background:var(--subtle);color:var(--faint);border-color:var(--border);text-decoration:line-through;opacity:.6}
.lp2{font-size:13px;font-weight:800;color:var(--gg-dark);min-width:40px;text-align:right;padding-top:1px}
.lr.gold{background:linear-gradient(135deg,#fffbe6,#fff8d0);border-left:4px solid #FFD700}
.lr.silver{background:linear-gradient(135deg,#f8f8f8,#efefef);border-left:4px solid #C0C0C0}
.lr.bronze{background:linear-gradient(135deg,#fff5ee,#fdebd0);border-left:4px solid #CD7F32}
.lr.gold .ln{color:#8B6914;font-size:15px}
.lr.silver .ln{color:#555;font-size:14px}
.lr.bronze .ln{color:#7B4A1E;font-size:14px}
.lr.gold .lp2{color:#B8860B;font-size:16px}
.lr.silver .lp2{color:#555;font-size:15px}
.lr.bronze .lp2{color:#8B4513;font-size:14px}
.explainer{background:var(--gg-tint);border:1px solid var(--gg-light);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--gg-dark);cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.explainer-body{font-size:12px;color:var(--mid);padding:10px 14px;background:var(--gg-tint);border:1px solid var(--gg-light);border-top:none;border-radius:0 0 8px 8px;margin-top:-4px;margin-bottom:14px;display:none;line-height:1.6}
.explainer-body.open{display:block}
.bb-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.bb{font-size:13px;line-height:1.75;color:var(--dark);white-space:pre-wrap;min-height:100px}
.bb.ph{color:var(--muted);font-style:italic}
.ba{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:7px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--dark)}
.btn-primary{background:var(--gg-dark);border-color:var(--gg-dark);color:white}
.tone-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tp2{font-family:var(--font);font-size:10px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer}
.tp2.active{background:var(--gg-dark);border-color:var(--gg-dark);color:white}
.sweep-hero{background:var(--gg-dark);border-radius:var(--r);padding:18px;margin-bottom:12px;color:white}
.sweep-eyebrow{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gg-light);margin-bottom:4px}
.sweep-title{font-size:26px;font-weight:800;line-height:1.1;margin-bottom:3px}
.sweep-title span{color:var(--orange)}
.sweep-sub{font-size:11px;color:var(--gg-light)}
.prize-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.prize-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.prize-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.prize-amount{font-size:22px;font-weight:800;color:var(--gg-dark);line-height:1}
.prize-desc{font-size:11px;color:var(--muted);margin-top:3px}
.ko-round{margin-bottom:20px}
.ko-round-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding:0 2px}
.ko-match{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.ko-teams{flex:1}
.ko-team{display:flex;align-items:center;gap:6px;padding:3px 0}
.ko-team:first-child{border-bottom:1px solid var(--bl);margin-bottom:2px;padding-bottom:5px}
.ko-team-name{font-size:13px;font-weight:500;color:var(--dark);flex:1}
.ko-team-name.tbd{color:var(--faint);font-style:italic}
.ko-team-name.winner{font-weight:700}
.ko-score{font-size:14px;font-weight:700;color:var(--dark);min-width:20px;text-align:right;font-variant-numeric:tabular-nums}
.ko-score.winner{color:var(--gg-dark)}
.ko-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:50px}
.ko-time{font-size:10px;color:var(--muted);font-weight:500}
.ko-clash{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--gg-tint);color:var(--gg-dark);border:1px solid var(--gg-light);font-weight:600}
.res-score{font-size:15px;font-weight:800;color:var(--dark);padding:0 8px;font-variant-numeric:tabular-nums;text-align:center;min-width:45px}
.tn.dim{opacity:0.45}
.loading{padding:50px 20px;text-align:center;color:var(--muted);font-size:13px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gg-dark);margin:0 2px;animation:dp 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
.today-btn{font-family:var(--font);font-size:11px;font-weight:600;color:var(--gg-dark);background:var(--gg-tint);border:1px solid var(--gg-light);border-radius:20px;padding:5px 14px;cursor:pointer}
.bracket-owner{font-size:9px;font-weight:600;color:var(--muted);background:var(--subtle);padding:1px 5px;border-radius:3px;margin-left:auto;white-space:nowrap}
.bracket-owner.clash{background:var(--gg-tint);color:var(--gg-dark)}
.pitch-wrap{background:#2d6a35;border-radius:12px;padding:16px;position:relative;overflow:hidden;margin-bottom:12px}
.pitch-row-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:6px;margin-top:4px}
.pitch-player-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;position:relative;z-index:1}
.pitch-player{display:flex;flex-direction:column;align-items:center;gap:3px;width:68px}
.pitch-shirt{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:white;position:relative;flex-shrink:0}
.pitch-shirt-pts{position:absolute;bottom:-3px;right:-3px;background:#111;color:#FFD700;font-size:8px;font-weight:600;padding:1px 4px;border-radius:8px;white-space:nowrap}
.pitch-name{font-size:10px;font-weight:600;color:white;text-align:center;line-height:1.2}
.pitch-teams{font-size:8px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.3}
.pitch-divider{border:none;border-top:1px solid rgba(255,255,255,0.12);margin:4px 16px 8px}
.pitch-wrap{background:#2d6a35;border-radius:12px;padding:16px;position:relative;overflow:hidden;margin-bottom:12px}
.pitch-row-label{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:6px;margin-top:4px}
.pitch-player-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:10px;position:relative;z-index:1}
.pitch-player{display:flex;flex-direction:column;align-items:center;gap:3px;width:68px}
.pitch-shirt{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:white;position:relative;flex-shrink:0}
.pitch-shirt-pts{position:absolute;bottom:-3px;right:-3px;background:#111;color:#FFD700;font-size:8px;font-weight:600;padding:1px 4px;border-radius:8px;white-space:nowrap}
.pitch-name{font-size:10px;font-weight:600;color:white;text-align:center;line-height:1.2}
.pitch-teams{font-size:8px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.3}
.pitch-divider{border:none;border-top:1px solid rgba(255,255,255,0.12);margin:4px 16px 8px}
/* BRACKET */
.bracket-stage{margin-bottom:24px}
.bracket-stage-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding:0 2px}
.bracket-match{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.bracket-team{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;font-weight:500;color:var(--dark)}
.bracket-team:first-child{border-bottom:1px solid var(--bl)}
.bracket-team.winner{font-weight:700;background:var(--gg-tint)}
.bracket-team.tbd{color:var(--faint);font-style:italic}
.bracket-score{font-size:13px;font-weight:800;color:var(--dark);min-width:18px;text-align:right;margin-left:auto;font-variant-numeric:tabular-nums}
.bracket-score.winner{color:var(--gg-dark)}
.bracket-owner{font-size:9px;font-weight:600;color:var(--muted);background:var(--subtle);padding:1px 5px;border-radius:3px;margin-left:4px;white-space:nowrap}
.bracket-owner.clash{background:var(--gg-tint);color:var(--gg-dark)}
/* HEAD TO HEAD */
.h2h-picker{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.h2h-btn{font-family:var(--font);font-size:11px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.h2h-btn.active{background:var(--gg-dark);border-color:var(--gg-dark);color:white}
.h2h-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.h2h-header{background:var(--gg-dark);padding:16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.h2h-player{text-align:center;flex:1}
.h2h-player-name{font-size:14px;font-weight:800;color:white}
.h2h-player-pts{font-size:11px;color:var(--gg-light);margin-top:2px}
.h2h-vs{font-size:20px;font-weight:800;color:var(--orange)}
.h2h-stat{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bl)}
.h2h-stat:last-child{border-bottom:none}
.h2h-stat-label{font-size:11px;color:var(--muted);flex:1;text-align:center}
.h2h-val{font-size:15px;font-weight:800;color:var(--dark);min-width:50px;text-align:center}
.h2h-val.winning{color:var(--gg-dark)}
.h2h-match{padding:10px 14px;border-bottom:1px solid var(--bl);display:flex;align-items:center;gap:8px}
.h2h-match:last-child{border-bottom:none}
.countdown-card{background:var(--gg-dark);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.countdown-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gg-light);margin-bottom:4px}
.countdown-match{font-size:14px;font-weight:700;color:white;margin-bottom:2px}
.countdown-sub{font-size:11px;color:var(--gg-light)}
.countdown-timer{text-align:right;flex-shrink:0}
.countdown-time{font-size:22px;font-weight:800;color:var(--orange);font-variant-numeric:tabular-nums;line-height:1}
.countdown-timelabel{font-size:9px;color:var(--gg-light);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.goal-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bl)}
.goal-row:last-child{border-bottom:none}
.goal-bar-wrap{flex:1;background:var(--subtle);border-radius:4px;height:6px;overflow:hidden}
.goal-bar{height:6px;border-radius:4px;background:var(--gg-dark);transition:width 0.4s}
.goal-bar.top{background:var(--orange)}
.goal-count{font-size:13px;font-weight:800;color:var(--dark);min-width:28px;text-align:right}
.goal-name{font-size:12px;font-weight:600;color:var(--dark);min-width:70px}
.big-win-badge{display:inline-flex;align-items:center;gap:5px;background:var(--ot);border:1px solid var(--ob);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--orange);margin-bottom:10px}
</style>
</head>

var NAME_MAP={
  'United States':'USA','Czechia':'Czech Republic','Bosnia and Herzegovina':'Bosnia',
  'Cote d\'Ivoire':'Ivory Coast','Korea Republic':'South Korea','Congo DR':'DR Congo',
  'IR Iran':'Iran','Iran (Islamic Republic of)':'Iran','Curacao':'Curasao',
  'Curasao':'Curasao','Turkiye':'Turkey'
};

var STAGE_MAP={
  'GROUP_STAGE':'Group Stage','ROUND_OF_32':'Round of 32','LAST_16':'Round of 16',
  'QUARTER_FINALS':'Quarter-finals','SEMI_FINALS':'Semi-finals','THIRD_PLACE':'Third-place','FINAL':'Final'
};

var allMatches=[];
var usingLiveData=false;
var activeTone='banter';
var lastRefreshed=null;
var generatedBulletin='';
var explainerOpen=false;

function norm(n){return NAME_MAP[n]||n;}
function getFlag(n){return FLAGS[norm(n)]||FLAGS[n]||'?';}
function getOwner(name){
  var n=norm(name).toLowerCase().trim();
  for(var i=0;i<SWEEPSTAKE.length;i++){
    for(var j=0;j<SWEEPSTAKE[i].teams.length;j++){
      if(SWEEPSTAKE[i].teams[j].toLowerCase()===n)return SWEEPSTAKE[i].owner;
    }
  }
  return null;
}
function todayStr(){return new Date().toISOString().split('T')[0];}
function friendlyDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function localTime(u){return new Date(u).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function localDateKey(u){var d=new Date(u);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function stageLabel(s){return STAGE_MAP[s]||s||'Group Stage';}

function statusBar(){
  var t=lastRefreshed?lastRefreshed.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  if(usingLiveData)return '<div class="sb ok">Live data - Updated '+t+'</div>';
  return '<div class="sb warn">Showing schedule - Live scores unavailable - <button onclick="refreshAll()" style="background:none;border:none;cursor:pointer;color:inherit;font-weight:700;font-family:inherit;font-size:inherit;text-decoration:underline">Refresh</button></div>';
}

function calcLeaderboard(){
  var pts={},w={},d={},l={},elim={};
  for(var i=0;i<SWEEPSTAKE.length;i++){pts[SWEEPSTAKE[i].owner]=0;w[SWEEPSTAKE[i].owner]=0;d[SWEEPSTAKE[i].owner]=0;l[SWEEPSTAKE[i].owner]=0;}
  for(var i=0;i<allMatches.length;i++){
    var m=allMatches[i];
    if(m.status!=='finished'||m.score1===null||m.score2===null)continue;
    var o1=getOwner(m.team1),o2=getOwner(m.team2);
    var isKnockout=m.stage!=='Group Stage';
    if(m.score1>m.score2){if(o1){pts[o1]+=3;w[o1]++;}if(o2){l[o2]++;if(isKnockout)elim[m.team2]=true;}}
    else if(m.score2>m.score1){if(o2){pts[o2]+=3;w[o2]++;}if(o1){l[o1]++;if(isKnockout)elim[m.team1]=true;}}
    else{
      if(o1){pts[o1]++;d[o1]++;}if(o2){pts[o2]++;d[o2]++;}
      if(isKnockout&&m.penaltyWinner){
        var loserTeam=m.penaltyWinner===m.team1?m.team2:m.team1;
        elim[loserTeam]=true;
      }
    }
  }
  return SWEEPSTAKE.map(function(e){return {owner:e.owner,teams:e.teams,pts:pts[e.owner]||0,wins:w[e.owner]||0,draws:d[e.owner]||0,losses:l[e.owner]||0,elim:elim};}).sort(function(a,b){return b.pts-a.pts||b.wins-a.wins;});
}

function calcGoals(){
  var goals={};
  for(var i=0;i<SWEEPSTAKE.length;i++)goals[SWEEPSTAKE[i].owner]=0;
  for(var i=0;i<allMatches.length;i++){
    var m=allMatches[i];
    if(m.status!=='finished'||m.score1===null)continue;
    var o1=getOwner(m.team1),o2=getOwner(m.team2);
    if(o1)goals[o1]=(goals[o1]||0)+m.score1;
    if(o2)goals[o2]=(goals[o2]||0)+m.score2;
  }
  return Object.keys(goals).map(function(o){return{owner:o,goals:goals[o]};}).sort(function(a,b){return b.goals-a.goals;});
}

function calcBiggestWin(){
  var best=null,bestDiff=0;
  for(var i=0;i<allMatches.length;i++){
    var m=allMatches[i];
    if(m.status!=='finished'||m.score1===null)continue;
    var diff=Math.abs(m.score1-m.score2);
    if(diff>bestDiff){bestDiff=diff;best=m;}
  }
  return best;
}

function nextClash(){
  var now=new Date();
  var upcoming=allMatches.filter(function(m){
    return m.status==='scheduled'&&m.utcDate&&new Date(m.utcDate)>now;
  });
  var clashes=upcoming.filter(function(m){
    var o1=getOwner(m.team1),o2=getOwner(m.team2);
    return o1&&o2&&o1!==o2;
  });
  if(!clashes.length)return null;
  clashes.sort(function(a,b){return new Date(a.utcDate)-new Date(b.utcDate);});
  return clashes[0];
}

function formatCountdown(ms){
  if(ms<=0)return'Starting now!';
  var h=Math.floor(ms/3600000);
  var m=Math.floor((ms%3600000)/60000);
  if(h>=24){var d=Math.floor(h/24);return d+'d '+(h%24)+'h';}
  return h+'h '+m+'m';
}

function fetchMatches(){
  allMatches=JSON.parse(JSON.stringify(BASE_MATCHES));
  usingLiveData=false;
  lastRefreshed=new Date();
  var controller=new AbortController();
  var timeout=setTimeout(function(){controller.abort();},8000);
  return fetch('/api/matches',{signal:controller.signal})
    .then(function(res){
      clearTimeout(timeout);
      if(!res.ok)return;
      return res.json().then(function(data){
        if(!data.matches||!data.matches.length)return;
        var live=data.matches.map(function(m){
          return {
            date:m.utcDate.split('T')[0],utcDate:m.utcDate,stage:stageLabel(m.stage),
            team1:norm(m.homeTeam.name||'TBD'),team2:norm(m.awayTeam.name||'TBD'),
            score1:m.score&&m.score.fullTime?m.score.fullTime.home:null,
            score2:m.score&&m.score.fullTime?m.score.fullTime.away:null,
            status:m.status==='FINISHED'?'finished':(m.status==='IN_PLAY'||m.status==='PAUSED')?'live':'scheduled'
          };
        });
        allMatches=mergeLiveData(live);
        usingLiveData=true;
        lastRefreshed=new Date();
      });
    })
    .catch(function(){clearTimeout(timeout);});
}

function mergeLiveData(live){
  var merged=JSON.parse(JSON.stringify(BASE_MATCHES));
  for(var i=0;i<live.length;i++){
    var l=live[i];
    var idx=-1;
    for(var j=0;j<merged.length;j++){
      var b=merged[j];
      if(b.date===l.date&&((b.team1.toLowerCase()===l.team1.toLowerCase()&&b.team2.toLowerCase()===l.team2.toLowerCase())||(b.team1.toLowerCase()===l.team2.toLowerCase()&&b.team2.toLowerCase()===l.team1.toLowerCase()))){idx=j;break;}
    }
    if(idx>=0){merged[idx].score1=l.score1;merged[idx].score2=l.score2;merged[idx].status=l.status;}
    else if(l.team1!=='TBD'&&l.team2!=='TBD'){
      for(var j=0;j<merged.length;j++){
        if(merged[j].date===l.date&&merged[j].team1==='TBD'&&merged[j].stage===l.stage){
          merged[j].team1=l.team1;merged[j].team2=l.team2;merged[j].score1=l.score1;merged[j].score2=l.score2;merged[j].status=l.status;break;
        }
      }
    }
  }
  return merged;
}

function generateBulletin(){
  var today=todayStr();
  var ranked=calcLeaderboard();
  var todayMs=allMatches.filter(function(m){return m.date===today;});
  var recentMs=allMatches.filter(function(m){return m.status==='finished';}).slice(-6);
  var top=ranked[0];
  var clashesToday=todayMs.filter(function(m){var o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;});
  var matchList=todayMs.map(function(m){return getFlag(m.team1)+' '+m.team1+' vs '+m.team2+' '+getFlag(m.team2);}).join('\n');
  var recentList=recentMs.map(function(m){return m.team1+' '+m.score1+'-'+m.score2+' '+m.team2;}).join(', ');
  var msg='';
  if(activeTone==='banter'){
    var intros=['Good morning QFP! Another day, another chance to outlast your colleagues.','Rise and shine! The World Cup waits for no one.','Morning all! Your daily sweepstake bulletin has arrived.'];
    msg=pick(intros)+'\n\n';
    if(todayMs.length)msg+='Today\'s matches:\n'+matchList+'\n\n';
    else msg+='No matches today.\n\n';
    if(clashesToday.length){msg+='QFP Clash:\n';for(var i=0;i<clashesToday.length;i++){var m=clashesToday[i];msg+=getOwner(m.team1)+' vs '+getOwner(m.team2)+' - avoid eye contact in the corridor\n';}msg+='\n';}
    if(recentMs.length)msg+='Recent results: '+recentList+'\n\n';
    msg+='Leaderboard: '+top.owner+' leads on '+top.pts+'pts';
  } else if(activeTone==='pundit'){
    msg='QFP World Cup Bulletin\n\n';
    if(todayMs.length)msg+='Today\'s fixtures:\n'+matchList+'\n\n';
    if(clashesToday.length){var m=clashesToday[0];msg+='The standout clash: '+getOwner(m.team1)+' vs '+getOwner(m.team2)+'. One will be very quiet tomorrow.\n\n';}
    if(recentMs.length)msg+='Recent results: '+recentList+'\n\n';
    msg+='Standings: '+top.owner+' leads on '+top.pts+' points.';
  } else if(activeTone==='hype'){
    msg='QFP WORLD CUP UPDATE!!!\n\n';
    if(todayMs.length)msg+='TODAYS MATCHES:\n'+matchList+'\nTHIS IS MASSIVE.\n\n';
    if(clashesToday.length){msg+='COLLEAGUE CLASH!!!\n';for(var i=0;i<clashesToday.length;i++){var m=clashesToday[i];msg+=getOwner(m.team1).toUpperCase()+' VS '+getOwner(m.team2).toUpperCase()+'!!! SOMEONE IS GETTING BLOCKED ON SLACK!!!\n';}msg+='\n';}
    if(recentMs.length)msg+='RECENT RESULTS: '+recentList+'\n\n';
    msg+='LEADERBOARD: '+top.owner.toUpperCase()+' ON '+top.pts+'PTS!!!';
  } else {
    var intros2=['Good morning. The World Cup is happening.','Another day, another football.','Football update: the ball is still round.'];
    msg=pick(intros2)+'\n\n';
    if(todayMs.length)msg+='Matches today (allegedly):\n'+matchList+'\n\nWill these be good? Statistics suggest: possibly.\n\n';
    if(clashesToday.length){var m=clashesToday[0];msg+=getOwner(m.team1)+' and '+getOwner(m.team2)+' are playing each other. It is both exciting and completely irrelevant.\n\n';}
    if(recentMs.length)msg+='Things that happened: '+recentList+'. These are facts.\n\n';
    msg+=top.owner+' leads the sweepstake. Good luck everyone.';
  }
  generatedBulletin=msg;
  var el=document.getElementById('bb');
  if(el){el.className='bb';el.textContent=msg;}
}

function generateWeekend(){
  var today=new Date();
  var day=today.getDay();
  var daysToSat=day===6?0:(6-day);
  var sat=new Date(today);sat.setDate(today.getDate()+daysToSat);
  var sun=new Date(today);sun.setDate(today.getDate()+daysToSat+1);
  function fmt(d){return d.toISOString().split('T')[0];}
  var weekendDates=day===5?[fmt(today),fmt(sat),fmt(sun)]:[fmt(sat),fmt(sun)];
  var weekendMs=allMatches.filter(function(m){return weekendDates.indexOf(m.date)>=0;});
  if(!weekendMs.length){generatedBulletin='No matches this weekend!';var el=document.getElementById('bb');if(el){el.className='bb';el.textContent=generatedBulletin;}return;}
  var ranked=calcLeaderboard();
  var top3=ranked.slice(0,3).map(function(r,i){return (i===0?'1st':i===1?'2nd':'3rd')+' '+r.owner+' '+r.pts+'pts';}).join(', ');
  var clashes=weekendMs.filter(function(m){var o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;});
  var byDate={};
  for(var i=0;i<weekendMs.length;i++){var m=weekendMs[i];if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  var parts=['QFP Weekend Preview','','Here is everything happening this weekend. Enjoy yours!',''];
  var sortedDates=Object.keys(byDate).sort();
  for(var di=0;di<sortedDates.length;di++){
    var date=sortedDates[di];
    parts.push(new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}));
    for(var mi=0;mi<byDate[date].length;mi++){
      var m=byDate[date][mi];
      var o1=getOwner(m.team1),o2=getOwner(m.team2);
      var isClash=o1&&o2&&o1!==o2;
      parts.push(getFlag(m.team1)+' '+m.team1+' vs '+m.team2+' '+getFlag(m.team2)+' - '+(m.utcDate?localTime(m.utcDate):'TBC')+(isClash?' ('+o1+' vs '+o2+')':''));
    }
    parts.push('');
  }
  if(clashes.length){parts.push('Weekend clashes: '+clashes.map(function(m){return getOwner(m.team1)+' vs '+getOwner(m.team2);}).join(', '));parts.push('');}
  parts.push('Leaderboard: '+top3);
  parts.push('');
  parts.push('Have a great weekend - see you Monday!');
  generatedBulletin=parts.join('\n');
  var el=document.getElementById('bb');
  if(el){el.className='bb';el.textContent=generatedBulletin;}
}

function copyBulletin(){
  if(!generatedBulletin)return;
  navigator.clipboard.writeText(generatedBulletin).then(function(){
    var btn=document.getElementById('cb');btn.textContent='Copied!';
    setTimeout(function(){btn.textContent='Copy';},2500);
  });
}

    h+='<div style="padding:10px 14px;border-bottom:1px solid var(--bl)"><div style="font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">'+h2hPlayer2+' teams</div><div class="lt">'+t2pills+'</div></div>';
    if(clashes.length){
      h+='<div style="padding:8px 14px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--bl)">Direct clashes ('+clashes.length+')</div>';
      for(var i=0;i<clashes.length;i++){var m=clashes[i];h+='<div class="mr"><span class="fl">'+getFlag(m.team1)+'</span><span class="tn" style="flex:1">'+m.team1+'</span><span style="font-size:13px;font-weight:800;color:var(--dark);padding:0 8px">'+(m.status==='finished'?m.score1+'-'+m.score2:'vs')+'</span><span class="tn" style="flex:1;text-align:right">'+m.team2+'</span><span class="fl">'+getFlag(m.team2)+'</span>'+(m.status==='finished'?'<span class="chip chip-ft" style="margin-left:6px">FT</span>':'<span class="chip chip-clash" style="margin-left:6px">'+localTime(m.utcDate)+'</span>')+'</div>';}
    } else {h+='<div style="padding:14px;text-align:center;font-size:12px;color:var(--muted)">No direct clashes yet</div>';}
    h+='</div>';
  }
  document.getElementById('tab-h2h').innerHTML=h;
}

function setH2H(player,name){if(player===1){h2hPlayer1=name;if(h2hPlayer2===name)h2hPlayer2='';}else{h2hPlayer2=name;if(h2hPlayer1===name)h2hPlayer1='';}renderH2H();}

function showTab(id,btn){
  var tabs=document.querySelectorAll('[id^="tab-"]');
  for(var i=0;i<tabs.length;i++)tabs[i].style.display='none';
  var btns=document.querySelectorAll('.tb');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  document.getElementById('tab-'+id).style.display='';
  btn.classList.add('active');
  if(id==='sweeps')renderSweeps();
  if(id==='fixtures')renderFixtures();
  if(id==='bracket')renderBracket();if(id==='h2h')renderH2H();if(id==='bracket')renderBracket();if(id==='h2h')renderH2H();
  if(id==='results')renderResults();
  if(id==='leaderboard')renderLeaderboard();
  if(id==='bulletin')renderBulletin();
}

function refreshAll(){
  var spin=document.getElementById('spin');
  spin.classList.add('go');
  fetchMatches().then(function(){
    var active=document.querySelector('.tb.active');
    if(!active){spin.classList.remove('go');return;}
    var tab=active.textContent.toLowerCase();
    if(tab==='sweeps')renderSweeps();
    else if(tab==='fixtures')renderFixtures();
    else if(tab==='knockout')renderKnockout();
    else if(tab==='results')renderResults();
    else if(tab==='leaderboard')renderLeaderboard();
    else if(tab==='bulletin')renderBulletin();
    spin.classList.remove('go');
  });
}

function init(){
  allMatches=JSON.parse(JSON.stringify(BASE_MATCHES));
  lastRefreshed=new Date();
  renderSweeps();
  fetchMatches().then(function(){
    var active=document.querySelector('.tb.active');
    if(!active)return;
    var tab=active.textContent.toLowerCase();
    if(tab==='sweeps')renderSweeps();
  });
  setInterval(refreshAll,90000);
}
