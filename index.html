  --ot:#FFF5F0;
  --ob:#FFD4C0;

  --gg-mid:#95B1AC;
  --gg-light:#B8C8C5;
  --gg-tint:#EBF0EF;
  /* Greys */
  --dark:#333333;
  --mid:#4D4D4D;
  --muted:#7D8784;
  --light:#95B1AC;
  --faint:#BCC1C1;

  --bg:#F2F2F2;
  --surface:#FFFFFF;
  --subtle:#ECECEC;
  --border:#BCC1C1;
  --bl:#ECECEC;

  --green:#3A5D4F;
  --gb:#EBF0EF;
  --gbr:#95B1AC;
  --red:#CC2200;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--dark);min-height:100vh}
.header{background:var(--gg-dark);border-bottom:3px solid var(--orange);padding:0 28px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;height:64px}
.ey{font-size:9px;font-weight:700;color:var(--orange);letter-spacing:2.5px;text-transform:uppercase}
.bt{font-size:17px;font-weight:700;color:#FFFFFF}
.lp{display:flex;align-items:center;gap:5px;background:var(--orange);color:white;font-size:9px;font-weight:800;letter-spacing:1.5px;padding:4px 10px;border-radius:20px}

.rb{display:flex;align-items:center;gap:5px;font-family:var(--font);font-size:11px;font-weight:600;color:var(--gg-light);background:none;border:1px solid var(--gg-mid);border-radius:6px;padding:5px 11px;cursor:pointer;transition:all .15s}

.si{display:inline-block}.si.go{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{background:var(--gg-dark);border-bottom:2px solid var(--orange);display:flex;padding:0 28px;overflow-x:auto}
.tb{font-family:var(--font);font-size:11px;font-weight:700;color:var(--gg-light);background:none;border:none;border-bottom:2px solid transparent;padding:14px 16px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:color .15s,border-color .15s;white-space:nowrap}
.tb:hover{color:#FFFFFF}.tb.active{color:#FFFFFF;border-bottom-color:var(--orange)}
.main{max-width:960px;margin:0 auto;padding:24px 28px 60px}
.sl{font-size:10px;font-weight:700;color:var(--light);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sb{font-size:11px;font-weight:600;padding:9px 14px;border-radius:6px;margin-bottom:16px}
.sb.ok{background:var(--gg-tint);color:var(--gg-dark);border:1px solid var(--gg-mid)}

.ch{padding:12px 16px;border-bottom:1px solid var(--bl);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}

.tc{border-color:var(--orange) !important;border-width:2px !important}
.tp{background:var(--orange);color:white;font-size:9px;font-weight:800;letter-spacing:1px;padding:2px 8px;border-radius:20px;text-transform:uppercase;margin-right:6px}

const norm=n=>NAME_MAP[n]||n;
const getFlag=n=>FLAGS[norm(n)]||FLAGS[n]||'🏳';
function getOwner(name){const n=norm(name).toLowerCase().trim();for(const e of SWEEPSTAKE)for(const t of e.teams)if(t.toLowerCase()===n)return e.owner;return null;}
const isMyTeam=n=>MY_TEAMS.some(t=>t.toLowerCase()===norm(n).toLowerCase());
const todayStr=()=>new Date().toISOString().split('T')[0];
const friendlyDate=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
let activeTZ='Europe/London';
const localTime=u=>new Date(u).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:activeTZ});
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const stageLabel=s=>STAGE_MAP[s]||s||'Group Stage';

// Merge live scores into base matches by team names
function mergeLiveData(liveMatches){
  const merged=JSON.parse(JSON.stringify(BASE_MATCHES));
  for(const live of liveMatches){
    const idx=merged.findIndex(b=>
      b.date===live.date&&
      (b.team1.toLowerCase()===live.team1.toLowerCase()||b.team2.toLowerCase()===live.team1.toLowerCase())&&
      (b.team1.toLowerCase()===live.team2.toLowerCase()||b.team2.toLowerCase()===live.team2.toLowerCase())
    );
    if(idx>=0){
      merged[idx].score1=live.score1;
      merged[idx].score2=live.score2;
      merged[idx].status=live.status;
      merged[idx].minute=live.minute;
    }
  }
  // Also add any knockout matches from live data that are TBD in base
  for(const live of liveMatches){
    if(live.team1!=='TBD'&&live.team2!=='TBD'){
      const exists=merged.some(b=>b.date===live.date&&b.team1===live.team1&&b.team2===live.team2);
      if(!exists){
        const tbdIdx=merged.findIndex(b=>b.date===live.date&&b.team1==='TBD'&&b.stage===live.stage);
        if(tbdIdx>=0){merged[tbdIdx].team1=live.team1;merged[tbdIdx].team2=live.team2;merged[tbdIdx].score1=live.score1;merged[tbdIdx].score2=live.score2;merged[tbdIdx].status=live.status;}
      }
    }
  }
  return merged;
}

async function fetchMatches(){
  // Use hardcoded data immediately — show the app instantly
  allMatches=JSON.parse(JSON.stringify(BASE_MATCHES));
  usingLiveData=false;
  lastRefreshed=new Date();
  // Try to get live scores in background with a 5 second timeout
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),5000);
    const res=await fetch('https://api.football-data.org/v4/competitions/WC/matches',{
      headers:{'X-Auth-Token':'c59da080b24b4d82ba842f93986dcc47'},
      signal:controller.signal
    });
    clearTimeout(timeout);
    if(res.ok){
      const data=await res.json();
      if(data.matches&&data.matches.length){
        const live=data.matches.map(m=>({
          date:m.utcDate.split('T')[0],utcDate:m.utcDate,stage:stageLabel(m.stage),
          team1:norm(m.homeTeam.name||'TBD'),team2:norm(m.awayTeam.name||'TBD'),
          score1:m.score&&m.score.fullTime?m.score.fullTime.home:null,
          score2:m.score&&m.score.fullTime?m.score.fullTime.away:null,
          status:m.status==='FINISHED'?'finished':(m.status==='IN_PLAY'||m.status==='PAUSED')?'live':'scheduled',
          minute:m.minute||null
        }));
        allMatches=mergeLiveData(live);
        usingLiveData=true;
        lastRefreshed=new Date();
      }
    }
  }catch(e){
    // API unavailable — hardcoded data already set above, just continue
  }
}

function calcLeaderboard(){
  const pts={},w={},d={},l={},elim={};
  for(const e of SWEEPSTAKE){pts[e.owner]=0;w[e.owner]=0;d[e.owner]=0;l[e.owner]=0;}
  for(const m of allMatches){
    if(m.status!=='finished'||m.score1===null||m.score2===null)continue;
    const o1=getOwner(m.team1),o2=getOwner(m.team2);
    if(m.score1>m.score2){if(o1){pts[o1]+=3;w[o1]++;}if(o2){l[o2]++;elim[m.team2]=true;}}
    else if(m.score2>m.score1){if(o2){pts[o2]+=3;w[o2]++;}if(o1){l[o1]++;elim[m.team1]=true;}}
    else{if(o1){pts[o1]++;d[o1]++;}if(o2){pts[o2]++;d[o2]++;}}
  }
  return SWEEPSTAKE.map(e=>({owner:e.owner,teams:e.teams,pts:pts[e.owner]||0,wins:w[e.owner]||0,draws:d[e.owner]||0,losses:l[e.owner]||0,elim})).sort((a,b)=>b.pts-a.pts||b.wins-a.wins);
}

function statusBar(){
  const t=lastRefreshed?lastRefreshed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
  return usingLiveData
    ?`<div class="sb ok">✅ Live scores connected — ${allMatches.length} matches loaded. Updated ${t}</div>`
    :`<div class="sb warn">📋 Showing full schedule (${allMatches.length} matches). Live scores will appear once the API connects — hit Refresh to try again.</div>`;
}

function renderMatches(){
  const today=todayStr();
  // Only show today and future matches — finished ones go to Results tab
  let matches=(activeStage==='all'?allMatches.slice():allMatches.filter(m=>m.stage===activeStage))
    .filter(m=>m.date>=today||m.status==='live');
  const byDate={};
  for(const m of matches){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  // Sort dates but put today first
  const dates=Object.keys(byDate).sort();
  const stages=['all','Group Stage','Round of 32','Round of 16','Quarter-finals','Semi-finals','Third-place','Final'];
  const upd=lastRefreshed?lastRefreshed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
  let h=statusBar();
  h+=`<div class="sl"><span>${allMatches.length} matches — full tournament</span><span>${upd?'Updated '+upd:''}</span></div>`;
  h+=`<div class="fr">${stages.map(s=>`<button class="fp ${activeStage===s?'active':''}" onclick="filterStage('${s}')">${s==='all'?'All stages':s}</button>`).join('')}</div>`;
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
    <span style="font-size:10px;font-weight:700;color:var(--light);letter-spacing:1px;text-transform:uppercase;">Times:</span>
    <button class="fp ${activeTZ==='Europe/London'?'active':''}" onclick="setTZ('Europe/London')">&#127468;&#127463; UK</button>
    <button class="fp ${activeTZ==='America/New_York'?'active':''}" onclick="setTZ('America/New_York')">&#127482;&#127480; New York</button>
    <button class="fp ${activeTZ==='UTC'?'active':''}" onclick="setTZ('UTC')">&#127760; UTC</button>
  </div>`;
  for(const date of dates){
    const ms=byDate[date];
    const isToday=date===today;
    const hasLive=ms.some(m=>m.status==='live');
    h+=`<div class="card ${isToday?'tc':''}"><div class="ch">
      <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
        ${isToday?'<span class="tp">Today</span>':''}
        <span class="cd">${friendlyDate(date)}</span>
        ${hasLive?'<span class="chip cl">● Live now</span>':''}
      </div>
      <div style="display:flex;align-items:center;gap:7px">
        <span class="st">${ms[0]?.stage||''}</span>
        <span style="font-size:11px;color:var(--light)">${ms.length} match${ms.length!==1?'es':''}</span>
      </div></div>`;
    for(const m of ms){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const isClash=o1&&o2&&o1!==o2;

      const timeStr=m.utcDate?localTime(m.utcDate):'TBC';
      let sh;
      if(m.status==='live')sh=`<span class="sc live">${m.score1??0}–${m.score2??0}</span><span class="chip cl">${m.minute?m.minute+"'":'Live'}</span>`;
      else if(m.status==='finished')sh=`<span class="sc">${m.score1??0}–${m.score2??0}</span><span class="chip cf">FT</span>`;
      else sh=`<span class="sc sch">${timeStr}</span>`;
      h+=`<div class="mr">
        <div class="mts"><span class="fl">${getFlag(m.team1)}</span><span class="tn ">${m.team1}</span><span class="vs">vs</span><span class="tn ">${m.team2}</span><span class="fl">${getFlag(m.team2)}</span></div>
        <div class="mri">${sh}${isClash?`<span class="chip cl">⚔ ${o1} vs ${o2}</span>`:''}</div>
      </div>`;
      if(o1||o2)h+=`<div class="or">${o1?`<span class="ot2 ">${getFlag(m.team1)} ${o1} — ${m.team1}</span>`:''}${o2?`<span class="ot2 ">${getFlag(m.team2)} ${o2} — ${m.team2}</span>`:''}</div>`;
    }
    h+='</div>';
  }
  document.getElementById('tab-matches').innerHTML=h;
}

function renderLeaderboard(){
  const ranked=calcLeaderboard();
  const played=allMatches.filter(m=>m.status==='finished').length;
  const clashes=allMatches.filter(m=>{const o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;}).length;
  const myPos=ranked.findIndex(r=>r.owner===ME)+1;
  let h=statusBar();
  h+=`<div class="sr"><div class="sx"><div class="sn">${played}</div><div class="sl2">Played</div><div class="ss">matches with results</div></div><div class="sx"><div class="sn">${clashes}</div><div class="sl2">QFP clashes</div><div class="ss">colleague showdowns</div></div><div class="sx"><div class="sn ac">${myPos||'–'}</div><div class="sl2">Your position</div><div class="ss">out of ${SWEEPSTAKE.length}</div></div></div>`;
  h+=`<div class="sl" style="margin-bottom:12px">Standings</div><div class="card">`;
  for(let i=0;i<ranked.length;i++){
    const r=ranked[i];
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span style="font-size:12px;color:var(--faint);font-weight:700">${i+1}</span>`;
    h+=`<div class="lr"><div class="lrk">${medal}</div><div class="li"><div class="ln ${r.owner===ME?'me':''}">${r.owner===ME?'You (Emily)':r.owner}</div><div class="lrec">${r.wins}W · ${r.draws}D · ${r.losses}L</div><div class="lt">${r.teams.map(t=>`<span class="ltt ${r.elim[t]?'out':''}">${getFlag(t)} ${t}</span>`).join('')}</div></div><span class="lp2">${r.pts}pts</span></div>`;
  }
  h+='</div>';
  document.getElementById('tab-leaderboard').innerHTML=h;
}

function renderBulletin(){
  const tones=[{id:'banter',label:'🏴‍☠️ Office banter'},{id:'pundit',label:'📺 Pundit mode'},{id:'hype',label:'🔥 Full hype'},{id:'chaos',label:'🎲 Chaos energy'}];
  let h=`<div class="sl" style="margin-bottom:12px">Daily Slack message</div><div class="tr">${tones.map(t=>`<button class="tp2 ${activeTone===t.id?'active':''}" onclick="setTone('${t.id}')">${t.label}</button>`).join('')}</div><div class="bw"><div class="bb ${generatedBulletin?'':'ph'}" id="bb">${generatedBulletin||'Choose a tone and hit Generate — your Slack message appears here, ready to copy.'}</div><div class="ba"><button class="btn or2" onclick="generateBulletin()">✨ Generate</button><button class="btn" id="cb" onclick="copyBulletin()">📋 Copy</button><button class="btn gh" onclick="generatedBulletin='';renderBulletin()">Clear</button></div></div><div class="ib"><h3>🔁 Automate the daily message — free, 5 mins</h3><p>1. Go to <strong>zapier.com</strong> and create a free account<br>2. New Zap → Trigger: <strong>Schedule by Zapier</strong> → Every day at 9:00am<br>3. Action: <strong>Slack → Send Channel Message</strong><br>4. Choose your channel — e.g. <code>#general</code> or <code>#world-cup-2026</code><br>5. Paste your favourite generated bulletin into the message body</p></div>`;
  document.getElementById('tab-bulletin').innerHTML=h;
}

function setTone(t){activeTone=t;renderBulletin();}

function generateBulletin(){
  const today=todayStr();
  const ranked=calcLeaderboard();
  const todayMs=allMatches.filter(m=>m.date===today);
  const recentMs=allMatches.filter(m=>m.status==='finished').slice(-6);
  const top=ranked[0];

  const clashesToday=todayMs.filter(m=>{const o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;});

  const matchList=todayMs.map(m=>`${getFlag(m.team1)} ${m.team1} vs ${m.team2} ${getFlag(m.team2)}`).join('\n');
  const recentList=recentMs.map(m=>`${m.team1} ${m.score1}–${m.score2} ${m.team2}`).join(' · ');
  const gen={
    banter:()=>{const intros=['Good morning QFP! ☕⚽ Another day, another chance to destroy your colleagues\' dreams.','Rise and shine, Quite Frankly fam! The World Cup waits for no one.','Morning all! 👋 Your daily sweepstake bulletin has arrived.'];const outros=['May the odds be ever in your favour. Or not. 🏆','Right then. Let\'s have it. ⚽🔥','Good luck everyone — you\'re going to need it. 😅'];let msg=pick(intros)+'\n\n';if(todayMs.length)msg+=`📅 *Today\'s matches:*\n${matchList}\n\n`;else msg+=`📅 No matches today — enjoy the rest.\n\n`;if(clashesToday.length){msg+=`⚔️ *QFP CLASH${clashesToday.length>1?'ES':''}!*\n`;const clashLines=['Someone\'s getting the silent treatment at lunch. 😶','HR has been notified. 😅','One of them is buying the next round. 🍺','Avoid eye contact in the corridor. 👀','This one\'s going to make the Monday meeting very awkward. 😬'];let ci=0;for(const m of clashesToday){msg+=`${getOwner(m.team1)} vs ${getOwner(m.team2)} — ${clashLines[ci%clashLines.length]}\n`;ci++;}msg+='\n';}if(recentMs.length)msg+=`📊 *Recent results:* ${recentList}\n\n`;msg+=`🏅 *Leaderboard:* ${top.owner} leads on ${top.pts}pts`;msg+=`\n\n${pick(outros)}`;return msg;},
    pundit:()=>{let msg=`*QFP World Cup Bulletin* ⚽\n\n`;if(todayMs.length)msg+=`*Today\'s fixtures:*\n${matchList}\n\n`;else msg+=`No fixtures today. A day to reflect.\n\n`;if(clashesToday.length){const m=clashesToday[0];msg+=`*The standout clash:* ${getOwner(m.team1)} versus ${getOwner(m.team2)} — ${m.team1} against ${m.team2}. One of them will be very quiet in the office tomorrow. The other will not stop talking about it.\n\n`;}if(recentMs.length)msg+=`*Recent results:* ${recentList}\n\n`;msg+=`*Standings:* ${top.owner} leads on ${top.pts} points.`;return msg;},
    hype:()=>{let msg=`🚨🚨 QFP WORLD CUP UPDATE 🚨🚨\n\n`;if(todayMs.length)msg+=`TODAY\'S MATCHES:\n${matchList}\n\nTHIS IS MASSIVE.\n\n`;else msg+=`No matches today but THE TENSION IS BUILDING!!! 😤\n\n`;if(clashesToday.length){msg+=`⚔️ COLLEAGUE CLASH!!! ⚔️\n`;const hypePhrases=['DO NOT SIT NEXT TO EACH OTHER!!!','SOMEONE IS GETTING BLOCKED ON SLACK!!!','THE TENSION IS UNBEARABLE!!!','ONE OF THEM IS GOING HOME!!!'];let hi=0;for(const m of clashesToday){msg+=`${getOwner(m.team1).toUpperCase()} VS ${getOwner(m.team2).toUpperCase()}!!! ${hypePhrases[hi%hypePhrases.length]}\n`;hi++;}msg+='\n';}if(recentMs.length)msg+=`RECENT RESULTS: ${recentList}\n\n`;msg+=`LEADERBOARD: ${top.owner} ON ${top.pts}PTS!!! 🏆🔥`;return msg;},
    chaos:()=>{const intros=['Good morning. The World Cup is happening. Are we okay with this?','Another day, another football. I have eaten breakfast. The sweepstake continues.','Football update: the ball is still round. Everything is fine.'];let msg=pick(intros)+'\n\n';if(todayMs.length)msg+=`Matches today (allegedly):\n${matchList}\n\nWill these be good? Statistics suggest: possibly.\n\n`;if(clashesToday.length){const m=clashesToday[0];msg+=`${getOwner(m.team1)} and ${getOwner(m.team2)} are playing each other which is either very exciting or completely irrelevant. It is both.\n\n`;}if(recentMs.length)msg+=`Things that happened: ${recentList}. These are facts.\n\n`;msg+=`${top.owner} leads the sweepstake. This may or may not continue. Good luck everyone.`;return msg;}
  };
  generatedBulletin=gen[activeTone]();
  const el=document.getElementById('bb');el.classList.remove('ph');el.textContent=generatedBulletin;
}

function copyBulletin(){if(!generatedBulletin)return;navigator.clipboard.writeText(generatedBulletin).then(()=>{const btn=document.getElementById('cb');btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2500);});}

function renderMyTeams(){
  let h=`<div class="sl" style="margin-bottom:12px">Your teams, Emily</div><div class="mtg">`;
  for(const team of MY_TEAMS){
    const tms=allMatches.filter(m=>m.team1.toLowerCase()===team.toLowerCase()||m.team2.toLowerCase()===team.toLowerCase());
    const fin=tms.filter(m=>m.status==='finished');
    const ww=fin.filter(m=>{const t1=m.team1.toLowerCase()===team.toLowerCase();return t1?m.score1>m.score2:m.score2>m.score1;}).length;
    const dd=fin.filter(m=>m.score1===m.score2).length;
    const ll=fin.length-ww-dd;
    h+=`<div class="tcd"><div class="tct"><span class="tfb">${getFlag(team)}</span><div class="tcn">${team}</div><div class="tcp">${ww*3+dd}pts · ${ww}W ${dd}D ${ll}L</div></div>`;
    if(!tms.length)h+=`<div class="tm"><span style="color:var(--faint)">No fixtures found</span></div>`;
    for(const m of tms){
      const isT1=m.team1.toLowerCase()===team.toLowerCase();const opp=isT1?m.team2:m.team1;
      let result='',cls='s';
      if(m.status==='finished'){const myS=isT1?m.score1:m.score2,oppS=isT1?m.score2:m.score1;result=myS>oppS?'W':myS<oppS?'L':'D';cls=result==='W'?'w':result==='L'?'l':'d';result=`${result} ${m.score1}–${m.score2}`;}
      else if(m.status==='live'){result=`🔴 ${m.score1}–${m.score2}`;cls='w';}
      else{result=m.utcDate?localTime(m.utcDate):'TBC';}
      h+=`<div class="tm"><span class="tmd">${m.date.slice(5)}</span><span class="tmo">${getFlag(opp)} vs ${opp}</span><span class="tmr ${cls}">${result}</span></div>`;
    }
    h+='</div>';
  }
  h+=`</div><div class="sl" style="margin-bottom:12px">All 17 participants</div><div class="card">`;
  for(const e of SWEEPSTAKE)h+=`<div class="lr"><span class="ln ${e.owner===ME?'me':''}" style="min-width:90px;flex-shrink:0">${e.owner===ME?'You':e.owner}</span><div class="lt">${e.teams.map(t=>`<span class="ltt">${getFlag(t)} ${t}</span>`).join('')}</div></div>`;
  h+='</div>';
  document.getElementById('tab-myteams').innerHTML=h;
}

function setTZ(tz){activeTZ=tz;renderMatches();}

function renderSweeps(){
  const ranked=calcLeaderboard();
  const top=ranked[0];
  const played=allMatches.filter(m=>m.status==='finished').length;
  const total=allMatches.length;
  const remaining=total-played;
  const today=todayStr();
  const todayMs=allMatches.filter(m=>m.date===today&&m.status!=='finished');
  const clashesToday=todayMs.filter(m=>{const o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;});

  let h=`<div class="sweep-hero">
    <div class="sweep-eyebrow">QFP · 2026 Sweepstake</div>
    <div class="sweep-title">THE <span>DRAW</span></div>
    <div class="sweep-sub">${played} matches played · ${remaining} to go · ${SWEEPSTAKE.length} participants</div>
  </div>`;

  // Prize pot
  h+=`<div class="section-label" style="margin-bottom:10px">Prize pot</div>
  <div class="prize-grid">
    <div class="prize-card">
      <div class="prize-label">🥇 Winner</div>
      <div class="prize-amount">TBD</div>
      <div class="prize-desc">Decided at the Final · 19 July</div>
    </div>
    <div class="prize-card green">
      <div class="prize-label">🏅 Leaderboard</div>
      <div class="prize-amount" style="font-size:18px;padding-top:4px">2nd prize</div>
      <div class="prize-desc">Most points across all teams</div>
    </div>
  </div>`;

  // Today's clashes
  if(clashesToday.length){
    h+=`<div class="section-label" style="margin-bottom:10px">⚔️ QFP clashes today</div><div class="card">`;
    for(const m of clashesToday){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const timeStr=m.utcDate?localTime(m.utcDate):'TBC';
      h+=`<div class="mr">
        <div class="mts">
          <span class="fl">${getFlag(m.team1)}</span>
          <span class="tn">${m.team1}</span>
          <span class="vs-sep">vs</span>
          <span class="tn">${m.team2}</span>
          <span class="fl">${getFlag(m.team2)}</span>
        </div>
        <div class="mri"><span class="sc sch">${timeStr}</span></div>
      </div>
      <div class="or">
        <span class="chip cl">⚔ ${o1} vs ${o2}</span>
      </div>`;
    }
    h+=`</div>`;
  }

  // Mini leaderboard
  h+=`<div class="section-label" style="margin-bottom:10px;margin-top:16px">Current standings</div>
  <div class="card">`;
  const medals=['🥇','🥈','🥉'];
  for(let i=0;i<ranked.length;i++){
    const r=ranked[i];
    const medal=i<3?medals[i]:`<span style="font-size:11px;color:var(--faint);font-weight:700">${i+1}</span>`;
    h+=`<div class="mini-lb-row">
      <span class="mini-rank">${medal}</span>
      <div style="flex:1">
        <div class="mini-name">${r.owner}</div>
        <div class="mini-teams">${r.teams.map(t=>getFlag(t)+' '+t).join(' · ')}</div>
      </div>
      <span class="mini-pts">${r.pts}pts</span>
    </div>`;
  }
  h+=`</div>`;
  document.getElementById('tab-sweeps').innerHTML=h;
}

function renderResults(){
  const today=todayStr();
  let matches=allMatches.filter(m=>m.status==='finished').reverse();
  const byDate={};
  for(const m of matches){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  const dates=Object.keys(byDate).sort().reverse();
  
  if(!dates.length){
    document.getElementById('tab-results').innerHTML='<div class="loading" style="padding:40px">No results yet — check back once matches kick off!</div>';
    return;
  }
  
  const played=matches.length;
  const ranked=calcLeaderboard();
  let h=`<div class="sl" style="margin-bottom:14px"><span>${played} results so far</span></div>`;
  
  for(const date of dates){
    const ms=byDate[date];
    const d=new Date(date+'T12:00:00');
    const friendly=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
    h+=`<div class="card"><div class="ch"><span class="cd">${friendly}</span><span style="font-size:11px;color:var(--light)">${ms.length} result${ms.length!==1?'s':''}</span></div>`;
    for(const m of ms){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const isClash=o1&&o2&&o1!==o2;
      const w1=m.score1>m.score2,w2=m.score2>m.score1,draw=m.score1===m.score2;
      h+=`<div class="mr">
        <div class="mts">
          <span class="fl">${getFlag(m.team1)}</span>
          <span class="tn" style="${w1?'font-weight:700':w2?'opacity:0.5':''}">${m.team1}</span>
          <span style="font-size:15px;font-weight:800;color:var(--dark);padding:0 6px;font-variant-numeric:tabular-nums">${m.score1}–${m.score2}</span>
          <span class="tn" style="${w2?'font-weight:700':w1?'opacity:0.5':''}">${m.team2}</span>
          <span class="fl">${getFlag(m.team2)}</span>
          ${draw?'<span class="chip cf">Draw</span>':''}
        </div>
        <div class="mri">${isClash?`<span class="chip cl">⚔ ${o1} vs ${o2}</span>`:''}</div>
      </div>`;
      if(o1||o2)h+=`<div class="or">
        ${o1?`<span class="ot2 ${o1===ME?'mine':''}">${getFlag(m.team1)} ${o1} ${w1?'+3pts':draw?'+1pt':'0pts'}</span>`:''}
        ${o2?`<span class="ot2 ${o2===ME?'mine':''}">${getFlag(m.team2)} ${o2} ${w2?'+3pts':draw?'+1pt':'0pts'}</span>`:''}
      </div>`;
    }
    h+='</div>';
  }
  document.getElementById('tab-results').innerHTML=h;
}
function showTab(id,btn){document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');document.querySelectorAll('.tb').forEach(el=>el.classList.remove('active'));document.getElementById('tab-'+id).style.display='';btn.classList.add('active');if(id==='sweeps')renderSweeps();if(id==='matches')renderMatches();if(id==='results')renderResults();if(id==='leaderboard')renderLeaderboard();if(id==='bulletin')renderBulletin();if(id==='myteams')renderMyTeams();}
function filterStage(s){activeStage=s;renderMatches();}
async function refreshAll(){const spin=document.getElementById('spin');spin.classList.add('go');await fetchMatches();const active=document.querySelector('.tb.active').textContent.toLowerCase();if(active.includes('sweep'))renderSweeps();if(active.includes('fix'))renderMatches();if(active.includes('result'))renderResults();if(active.includes('leader'))renderLeaderboard();if(active.includes('bulletin'))renderBulletin();spin.classList.remove('go');}
async function init(){await fetchMatches();renderSweeps();setInterval(refreshAll,90000);}
init();
</script>
</body>
</html>
