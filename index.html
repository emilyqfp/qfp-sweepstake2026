<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QFP World Cup 2026 Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #FF5600;
  --ot: #FFF5F0;
  --ob: #FFD4C0;
  --gg-dark: #3A5D4F;
  --gg-mid: #95B1AC;
  --gg-light: #B8C8C5;
  --gg-tint: #EBF0EF;
  --dark: #333333;
  --mid: #4D4D4D;
  --muted: #7D8784;
  --light: #95B1AC;
  --faint: #BCC1C1;
  --bg: #F2F2F2;
  --surface: #FFFFFF;
  --subtle: #ECECEC;
  --border: #D8DFDE;
  --bl: #ECECEC;
  --red: #CC2200;
  --font: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --r: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--dark); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--gg-dark);
  border-bottom: 3px solid var(--orange);
  padding: 0 20px;
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  height: 58px;
}
.logo-svg { height: 32px; width: auto; }
.header-right { display: flex; align-items: center; gap: 10px; }
.live-pill { display: flex; align-items: center; gap: 5px; background: transparent; border: 1px solid var(--orange); color: var(--orange); font-size: 9px; font-weight: 700; letter-spacing: 1.5px; padding: 3px 9px; border-radius: 20px; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); animation: blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
.rb { display: flex; align-items: center; gap: 4px; font-family: var(--font); font-size: 11px; font-weight: 600; color: var(--gg-light); background: none; border: 1px solid rgba(149,177,172,0.4); border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all .15s; }
.rb:hover { background: rgba(255,255,255,0.1); color: white; }
.spin { display: inline-block; }
.spin.go { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TABS */
.tabs { background: var(--gg-dark); border-bottom: 1px solid rgba(149,177,172,0.2); display: flex; padding: 0 20px; overflow-x: auto; }
.tabs::-webkit-scrollbar { display: none; }
.tb { font-family: var(--font); font-size: 11px; font-weight: 600; color: var(--gg-light); background: none; border: none; border-bottom: 2px solid transparent; padding: 12px 14px; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; transition: all .15s; white-space: nowrap; }
.tb:hover { color: white; }
.tb.active { color: white; border-bottom-color: var(--gg-light); }

/* MAIN */
.main { max-width: 720px; margin: 0 auto; padding: 16px 16px 60px; }

/* STATUS BAR */
.sb { font-size: 11px; font-weight: 600; padding: 8px 12px; border-radius: 6px; margin-bottom: 14px; }
.sb.ok { background: var(--gg-tint); color: var(--gg-dark); border: 1px solid var(--gg-light); }
.sb.warn { background: #FFF8E1; color: #7D5A00; border: 1px solid #FFE082; }

/* SECTION LABEL */
.sl { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 10px; }
.ch { padding: 11px 14px; border-bottom: 1px solid var(--bl); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
.cd { font-size: 13px; font-weight: 700; color: var(--dark); }
.today-card { border-color: var(--gg-dark); border-width: 2px; }
.today-pill { background: var(--gg-dark); color: white; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; margin-right: 5px; }
.stage-tag { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; background: var(--subtle); padding: 2px 6px; border-radius: 4px; }

/* MATCH ROW */
.mr { padding: 10px 14px; border-bottom: 1px solid var(--bl); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.mr:last-child { border-bottom: none; }
.mts { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 180px; }
.fl { font-size: 17px; flex-shrink: 0; line-height: 1; }
.tn { font-size: 13px; font-weight: 500; color: var(--dark); }
.vs { font-size: 10px; color: var(--faint); font-weight: 400; }
.mri { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

/* SCORE */
.sc { background: var(--subtle); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 14px; font-weight: 700; color: var(--dark); min-width: 50px; text-align: center; font-variant-numeric: tabular-nums; }
.sc.live { border-color: var(--orange); color: var(--orange); background: var(--ot); }
.sc.sch { font-size: 11px; color: var(--muted); font-weight: 500; }

/* CHIPS */
.chip { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
.chip-live { background: var(--ot); color: var(--orange); border: 1px solid var(--ob); }
.chip-ft { background: var(--gg-tint); color: var(--gg-dark); }
.chip-clash { background: var(--gg-tint); color: var(--gg-dark); border: 1px solid var(--gg-light); }

/* OWNER ROW */
.or { padding: 3px 14px 8px; display: flex; gap: 4px; flex-wrap: wrap; }
.ot2 { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; background: var(--subtle); color: var(--muted); border: 1px solid var(--border); }

/* FILTER PILLS */
.fr { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
.fp { font-family: var(--font); font-size: 10px; font-weight: 600; letter-spacing: 0.3px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
.fp:hover { background: var(--subtle); color: var(--dark); }
.fp.active { background: var(--gg-dark); border-color: var(--gg-dark); color: white; }

/* STATS */
.sr { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
.sx { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.sn { font-size: 22px; font-weight: 800; color: var(--dark); line-height: 1; }
.sn.ac { color: var(--gg-dark); }
.sl2 { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
.ss { font-size: 11px; color: var(--faint); margin-top: 1px; }

/* LEADERBOARD */
.lr { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--bl); }
.lr:last-child { border-bottom: none; }
.lrk { font-size: 15px; min-width: 26px; padding-top: 1px; }
.li { flex: 1; min-width: 0; }
.ln { font-size: 13px; font-weight: 700; color: var(--dark); }
.lrec { font-size: 10px; color: var(--faint); margin-top: 1px; margin-bottom: 4px; }
.lt { display: flex; gap: 4px; flex-wrap: wrap; }
.ltt { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; background: var(--gg-tint); color: var(--gg-dark); border: 1px solid var(--gg-light); }
.ltt.out { background: var(--subtle); color: var(--faint); border-color: var(--border); text-decoration: line-through; opacity: .6; }
.lp2 { font-size: 13px; font-weight: 800; color: var(--gg-dark); min-width: 40px; text-align: right; padding-top: 1px; }

/* POINTS EXPLAINER */
.explainer { background: var(--gg-tint); border: 1px solid var(--gg-light); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: var(--gg-dark); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.explainer-body { font-size: 12px; color: var(--mid); padding: 10px 14px; background: var(--gg-tint); border: 1px solid var(--gg-light); border-top: none; border-radius: 0 0 8px 8px; margin-top: -4px; margin-bottom: 14px; display: none; line-height: 1.6; }
.explainer-body.open { display: block; }

/* BULLETIN */
.bb-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
.bb { font-size: 13px; line-height: 1.75; color: var(--dark); white-space: pre-wrap; min-height: 100px; }
.bb.ph { color: var(--muted); font-style: italic; }
.ba { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.btn { font-family: var(--font); font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; border: 1px solid var(--border); background: none; color: var(--dark); }
.btn:hover { background: var(--subtle); }
.btn-primary { background: var(--gg-dark); border-color: var(--gg-dark); color: white; }
.btn-primary:hover { background: #2e4a3e; }
.tone-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.tp2 { font-family: var(--font); font-size: 10px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
.tp2.active { background: var(--gg-dark); border-color: var(--gg-dark); color: white; }
.tp2:hover:not(.active) { background: var(--subtle); }

/* SWEEPS */
.sweep-hero { background: var(--gg-dark); border-radius: var(--r); padding: 18px; margin-bottom: 12px; color: white; }
.sweep-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gg-light); margin-bottom: 4px; }
.sweep-title { font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 3px; }
.sweep-title span { color: var(--orange); }
.sweep-sub { font-size: 11px; color: var(--gg-light); }
.prize-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.prize-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.prize-label { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.prize-amount { font-size: 22px; font-weight: 800; color: var(--gg-dark); line-height: 1; }
.prize-desc { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* KNOCKOUT */
.ko-round { margin-bottom: 20px; }
.ko-round-title { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; padding: 0 2px; }
.ko-match { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.ko-teams { flex: 1; }
.ko-team { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
.ko-team:first-child { border-bottom: 1px solid var(--bl); margin-bottom: 2px; padding-bottom: 5px; }
.ko-team-name { font-size: 13px; font-weight: 500; color: var(--dark); flex: 1; }
.ko-team-name.tbd { color: var(--faint); font-style: italic; }
.ko-team-name.winner { font-weight: 700; }
.ko-score { font-size: 14px; font-weight: 700; color: var(--dark); min-width: 20px; text-align: right; font-variant-numeric: tabular-nums; }
.ko-score.winner { color: var(--gg-dark); }
.ko-score.tbd { color: var(--faint); }
.ko-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; min-width: 50px; }
.ko-time { font-size: 10px; color: var(--muted); font-weight: 500; }
.ko-clash { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--gg-tint); color: var(--gg-dark); border: 1px solid var(--gg-light); font-weight: 600; }

/* RESULTS */
.res-score { font-size: 15px; font-weight: 800; color: var(--dark); padding: 0 8px; font-variant-numeric: tabular-nums; text-align: center; min-width: 45px; }
.tn.dim { opacity: 0.45; }

/* LOADING */
.loading { padding: 50px 20px; text-align: center; color: var(--muted); font-size: 13px; }
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gg-dark); margin: 0 2px; animation: dp 1.2s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}

/* SCROLL TO TODAY BTN */
.today-btn { font-family: var(--font); font-size: 11px; font-weight: 600; color: var(--gg-dark); background: var(--gg-tint); border: 1px solid var(--gg-light); border-radius: 20px; padding: 5px 14px; cursor: pointer; transition: all .15s; }
.today-btn:hover { background: var(--gg-dark); color: white; }

@media(max-width:500px){ .main{padding:12px 12px 60px} .sr{grid-template-columns:repeat(3,1fr)} }
</style>
</head>
<body>

<div class="header">
  <!-- QFP Logo SVG -->
  <svg class="logo-svg" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="3" height="8" fill="#FF5600"/>
    <rect x="0" y="0" width="8" height="3" fill="#FF5600"/>
    <rect x="0" y="32" width="3" height="8" fill="#FF5600"/>
    <rect x="0" y="37" width="8" height="3" fill="#FF5600"/>
    <rect x="42" y="0" width="3" height="8" fill="#FF5600"/>
    <rect x="37" y="0" width="8" height="3" fill="#FF5600"/>
    <rect x="42" y="32" width="3" height="8" fill="#FF5600"/>
    <rect x="37" y="37" width="8" height="3" fill="#FF5600"/>
    <text x="7" y="30" font-family="Arial" font-weight="bold" font-size="22" fill="white">QFP</text>
    <text x="52" y="28" font-family="Arial" font-weight="600" font-size="13" fill="#B8C8C5">World Cup 2026</text>
  </svg>
  <div class="header-right">
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <button class="rb" onclick="refreshAll()"><span class="spin" id="spin">↻</span></button>
  </div>
</div>

<div class="tabs">
  <button class="tb active" onclick="showTab('sweeps',this)">Sweeps</button>
  <button class="tb" onclick="showTab('fixtures',this)">Fixtures</button>
  <button class="tb" onclick="showTab('knockout',this)">Knockout</button>
  <button class="tb" onclick="showTab('results',this)">Results</button>
  <button class="tb" onclick="showTab('leaderboard',this)">Leaderboard</button>
  <button class="tb" onclick="showTab('bulletin',this)">Bulletin</button>
</div>

<div class="main">
  <div id="tab-sweeps"><div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
  <div id="tab-fixtures" style="display:none"></div>
  <div id="tab-knockout" style="display:none"></div>
  <div id="tab-results" style="display:none"></div>
  <div id="tab-leaderboard" style="display:none"></div>
  <div id="tab-bulletin" style="display:none"></div>
</div>

<script>
const SWEEPSTAKE=[
  {owner:'Lies',teams:['Brazil','DR Congo']},
  {owner:'Ben P',teams:['USA','Jordan','Croatia']},
  {owner:'Katie',teams:['Sweden','Czech Republic','Switzerland']},
  {owner:'Sitara',teams:['Belgium','Cape Verde','Ghana']},
  {owner:'Claire',teams:['Argentina','Egypt']},
  {owner:'Ness',teams:['Portugal','Haiti','Senegal']},
  {owner:'Emily',teams:['Morocco','Paraguay','Tunisia']},
  {owner:'Mariana',teams:['England','Panama','Curaçao']},
  {owner:'Andrea',teams:['Netherlands','Iraq','Turkey']},
  {owner:'Jez',teams:['Japan','Bosnia','Norway']},
  {owner:'Sally',teams:['Ecuador','Saudi Arabia','South Korea']},
  {owner:'Luna',teams:['Germany','Uzbekistan']},
  {owner:'Catherine',teams:['Austria','South Africa','France']},
  {owner:'Bobby',teams:['Spain','New Zealand','Iran']},
  {owner:'Matilde',teams:['Ivory Coast','Australia','Algeria']},
  {owner:'Sam',teams:['Uruguay','Scotland','Colombia']},
  {owner:'Charlotte',teams:['Mexico','Canada','Qatar']}
];

const FLAGS={'Brazil':'🇧🇷','DR Congo':'🇨🇩','USA':'🇺🇸','Jordan':'🇯🇴','Croatia':'🇭🇷','Sweden':'🇸🇪','Czech Republic':'🇨🇿','Switzerland':'🇨🇭','Belgium':'🇧🇪','Cape Verde':'🇨🇻','Ghana':'🇬🇭','Argentina':'🇦🇷','Egypt':'🇪🇬','Portugal':'🇵🇹','Haiti':'🇭🇹','Senegal':'🇸🇳','Morocco':'🇲🇦','Paraguay':'🇵🇾','Tunisia':'🇹🇳','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Panama':'🇵🇦','Curaçao':'🇨🇼','Netherlands':'🇳🇱','Iraq':'🇮🇶','Turkey':'🇹🇷','Japan':'🇯🇵','Bosnia':'🇧🇦','Norway':'🇳🇴','Ecuador':'🇪🇨','Saudi Arabia':'🇸🇦','South Korea':'🇰🇷','Germany':'🇩🇪','Uzbekistan':'🇺🇿','Austria':'🇦🇹','South Africa':'🇿🇦','France':'🇫🇷','Spain':'🇪🇸','New Zealand':'🇳🇿','Iran':'🇮🇷','Ivory Coast':'🇨🇮','Australia':'🇦🇺','Algeria':'🇩🇿','Uruguay':'🇺🇾','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Colombia':'🇨🇴','Mexico':'🇲🇽','Canada':'🇨🇦','Qatar':'🇶🇦','TBD':'❓'};

const NAME_MAP={'United States':'USA','Czechia':'Czech Republic','Bosnia and Herzegovina':'Bosnia','Côte d\'Ivoire':'Ivory Coast','Korea Republic':'South Korea','South Korea':'South Korea','Congo DR':'DR Congo','DR Congo':'DR Congo','Iran (Islamic Republic of)':'Iran','IR Iran':'Iran','Curacao':'Curaçao','Curaçao':'Curaçao','Türkiye':'Turkey','Turkiye':'Turkey'};
const STAGE_MAP={'GROUP_STAGE':'Group Stage','ROUND_OF_32':'Round of 32','LAST_16':'Round of 16','QUARTER_FINALS':'Quarter-finals','SEMI_FINALS':'Semi-finals','THIRD_PLACE':'Third-place','FINAL':'Final'};

let allMatches=[];
let usingLiveData=false;
let activeStage='all';
let activeTone='banter';
let lastRefreshed=null;
let generatedBulletin='';
let explainerOpen=false;

const norm=n=>NAME_MAP[n]||n;
const getFlag=n=>FLAGS[norm(n)]||FLAGS[n]||'🏳';
function getOwner(name){const n=norm(name).toLowerCase().trim();for(const e of SWEEPSTAKE)for(const t of e.teams)if(t.toLowerCase()===n)return e.owner;return null;}
const todayStr=()=>new Date().toISOString().split('T')[0];
const friendlyDate=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
const localDate=u=>new Date(u).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
const localDateKey=u=>{const d=new Date(u);return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');};
const localTime=u=>new Date(u).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const stageLabel=s=>STAGE_MAP[s]||s||'Group Stage';

// ── FETCH ──────────────────────────────────────────────────────────────────
async function fetchMatches(){
  allMatches=JSON.parse(JSON.stringify(BASE_MATCHES));
  usingLiveData=false;
  lastRefreshed=new Date();
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),8000);
    const res=await fetch('/api/matches',{signal:controller.signal});
    clearTimeout(timeout);
    if(res.ok){
      const data=await res.json();
      if(data.matches&&data.matches.length){
        const live=data.matches.map(m=>({
          date:m.utcDate.split('T')[0],utcDate:m.utcDate,stage:stageLabel(m.stage),
          team1:norm(m.homeTeam.name||'TBD'),team2:norm(m.awayTeam.name||'TBD'),
          score1:m.score&&m.score.fullTime?m.score.fullTime.home:null,
          score2:m.score&&m.score.fullTime?m.score.fullTime.away:null,
          status:m.status==='FINISHED'?'finished':(m.status==='IN_PLAY'||m.status==='PAUSED')?'live':'scheduled',
          minute:m.minute||null
        }));
        allMatches=mergeLiveData(live);
        usingLiveData=true;
        lastRefreshed=new Date();
      }
    }
  }catch(e){}
}

function mergeLiveData(live){
  const merged=JSON.parse(JSON.stringify(BASE_MATCHES));
  for(const l of live){
    const idx=merged.findIndex(b=>b.date===l.date&&
      ((b.team1.toLowerCase()===l.team1.toLowerCase()&&b.team2.toLowerCase()===l.team2.toLowerCase())||
       (b.team1.toLowerCase()===l.team2.toLowerCase()&&b.team2.toLowerCase()===l.team1.toLowerCase())));
    if(idx>=0){merged[idx].score1=l.score1;merged[idx].score2=l.score2;merged[idx].status=l.status;merged[idx].minute=l.minute;}
    // knockout: fill TBD
    else if(l.team1!=='TBD'&&l.team2!=='TBD'){
      const tbdIdx=merged.findIndex(b=>b.date===l.date&&b.team1==='TBD'&&b.stage===l.stage);
      if(tbdIdx>=0){merged[tbdIdx].team1=l.team1;merged[tbdIdx].team2=l.team2;merged[tbdIdx].score1=l.score1;merged[tbdIdx].score2=l.score2;merged[tbdIdx].status=l.status;}
    }
  }
  return merged;
}

// ── LEADERBOARD ────────────────────────────────────────────────────────────
function calcLeaderboard(){
  const pts={},w={},d={},l={},elim={};
  for(const e of SWEEPSTAKE){pts[e.owner]=0;w[e.owner]=0;d[e.owner]=0;l[e.owner]=0;}
  for(const m of allMatches){
    if(m.status!=='finished'||m.score1===null||m.score2===null)continue;
    const o1=getOwner(m.team1),o2=getOwner(m.team2);
    if(m.score1>m.score2){if(o1){pts[o1]+=3;w[o1]++;}if(o2){l[o2]++;elim[m.team2]=true;}}
    else if(m.score2>m.score1){if(o2){pts[o2]+=3;w[o2]++;}if(o1){l[o1]++;elim[m.team1]=true;}}
    else{if(o1){pts[o1]++;d[o1]++;}if(o2){pts[o2]++;d[o2]++;}}
  }
  return SWEEPSTAKE.map(e=>({owner:e.owner,teams:e.teams,pts:pts[e.owner]||0,wins:w[e.owner]||0,draws:d[e.owner]||0,losses:l[e.owner]||0,elim})).sort((a,b)=>b.pts-a.pts||b.wins-a.wins);
}

function statusBar(){
  const t=lastRefreshed?lastRefreshed.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  return usingLiveData
    ?`<div class="sb ok">✅ Live data · Updated ${t}</div>`
    :`<div class="sb warn">📋 Showing schedule · Live scores unavailable · <button onclick="refreshAll()" style="background:none;border:none;cursor:pointer;color:inherit;font-weight:700;font-family:inherit;font-size:inherit;text-decoration:underline">Refresh</button></div>`;
}

// ── FIXTURES ───────────────────────────────────────────────────────────────
function renderFixtures(){
  const today=todayStr();
  const stages=['all','Group Stage','Round of 32','Round of 16','Quarter-finals','Semi-finals','Third-place','Final'];

  // Group stage only for the fixture list (knockout has its own tab)
  let matches=allMatches.filter(m=>activeStage==='all'?m.stage==='Group Stage':m.stage===activeStage);
  const byDate={};
  for(const m of matches){const key=m.utcDate?localDateKey(m.utcDate):m.date;if(!byDate[key])byDate[key]=[];byDate[key].push(m);}
  const dates=Object.keys(byDate).sort();
  const upd=lastRefreshed?lastRefreshed.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';

  let h=statusBar();
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span class="sl" style="margin-bottom:0">Group Stage</span>
    <button class="today-btn" onclick="scrollToToday()">↓ Today</button>
  </div>`;

  for(const date of dates){
    const ms=byDate[date];
    const isToday=date===today||date===localDateKey(new Date().toISOString());
    const hasLive=ms.some(m=>m.status==='live');
    h+=`<div class="card ${isToday?'today-card':''}" id="${isToday?'today-anchor':''}">
      <div class="ch">
        <div style="display:flex;align-items:center;gap:6px">
          ${isToday?'<span class="today-pill">Today</span>':''}
          <span class="cd">${byDate[date][0].utcDate?localDate(byDate[date][0].utcDate):friendlyDate(date)}</span>
          ${hasLive?'<span class="chip chip-live">● Live</span>':''}
        </div>
        <span style="font-size:11px;color:var(--muted)">${ms.length} match${ms.length!==1?'es':''}</span>
      </div>`;
    for(const m of ms){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const isClash=o1&&o2&&o1!==o2;
      let sh;
      if(m.status==='live')sh=`<span class="sc live">${m.score1??0}–${m.score2??0}</span><span class="chip chip-live">${m.minute?m.minute+"'":'Live'}</span>`;
      else if(m.status==='finished')sh=`<span class="sc">${m.score1??0}–${m.score2??0}</span><span class="chip chip-ft">FT</span>`;
      else sh=`<span class="sc sch">${m.utcDate?localTime(m.utcDate):'TBC'}</span>`;
      h+=`<div class="mr">
        <div class="mts"><span class="fl">${getFlag(m.team1)}</span><span class="tn">${m.team1}</span><span class="vs">vs</span><span class="tn">${m.team2}</span><span class="fl">${getFlag(m.team2)}</span></div>
        <div class="mri">${sh}${isClash?`<span class="chip chip-clash">⚔ ${o1} vs ${o2}</span>`:''}</div>
      </div>`;
      if(o1||o2)h+=`<div class="or">${o1?`<span class="ot2">${getFlag(m.team1)} ${o1}</span>`:''} ${o2?`<span class="ot2">${getFlag(m.team2)} ${o2}</span>`:''}</div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('tab-fixtures').innerHTML=h;
  // Scroll to today
  setTimeout(()=>{const el=document.getElementById('today-anchor');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

function scrollToToday(){
  const el=document.getElementById('today-anchor');
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── KNOCKOUT ───────────────────────────────────────────────────────────────
function renderKnockout(){
  const koStages=['Round of 32','Round of 16','Quarter-finals','Semi-finals','Third-place','Final'];
  let h=statusBar();

  for(const stage of koStages){
    const matches=allMatches.filter(m=>m.stage===stage);
    if(!matches.length)continue;
    h+=`<div class="ko-round"><div class="ko-round-title">${stage}</div>`;
    for(const m of matches){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const isClash=o1&&o2&&o1!==o2;
      const w1=m.status==='finished'&&m.score1>m.score2;
      const w2=m.status==='finished'&&m.score2>m.score1;
      const isTBD=m.team1==='TBD'&&m.team2==='TBD';
      const timeStr=m.utcDate?new Date(m.utcDate).toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+localTime(m.utcDate):'TBC';
      h+=`<div class="ko-match">
        <div class="ko-teams">
          <div class="ko-team">
            <span class="fl">${getFlag(m.team1)}</span>
            <span class="ko-team-name ${isTBD?'tbd':w1?'winner':''}">${isTBD?'TBD':m.team1}</span>
            ${m.status!=='scheduled'?`<span class="ko-score ${w1?'winner':''}">${m.score1??''}</span>`:''}
          </div>
          <div class="ko-team">
            <span class="fl">${getFlag(m.team2)}</span>
            <span class="ko-team-name ${isTBD?'tbd':w2?'winner':''}">${isTBD?'TBD':m.team2}</span>
            ${m.status!=='scheduled'?`<span class="ko-score ${w2?'winner':''}">${m.score2??''}</span>`:''}
          </div>
        </div>
        <div class="ko-meta">
          <span class="ko-time">${m.status==='finished'?'FT':m.status==='live'?'● Live':timeStr}</span>
          ${isClash?`<span class="ko-clash">⚔ ${o1} vs ${o2}</span>`:''}
          ${o1&&!o2?`<span class="ko-clash">${o1}</span>`:''}
          ${o2&&!o1?`<span class="ko-clash">${o2}</span>`:''}
        </div>
      </div>`;
    }
    h+=`</div>`;
  }
  document.getElementById('tab-knockout').innerHTML=h;
}

// ── RESULTS ────────────────────────────────────────────────────────────────
function renderResults(){
  const finished=allMatches.filter(m=>m.status==='finished').reverse();
  const byDate={};
  for(const m of finished){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  const dates=Object.keys(byDate).sort().reverse();
  if(!dates.length){document.getElementById('tab-results').innerHTML='<div class="loading">No results yet</div>';return;}
  let h=`<div class="sl" style="margin-bottom:10px">${finished.length} results</div>`;
  for(const date of dates){
    const ms=byDate[date];
    h+=`<div class="card"><div class="ch"><span class="cd">${friendlyDate(date)}</span></div>`;
    for(const m of ms){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const isClash=o1&&o2&&o1!==o2;
      const w1=m.score1>m.score2,w2=m.score2>m.score1;
      h+=`<div class="mr">
        <div class="mts" style="justify-content:flex-end;flex:1">
          <span class="tn ${w2?'dim':''}" style="${w1?'font-weight:700':''}">${m.team1}</span>
          <span class="fl">${getFlag(m.team1)}</span>
        </div>
        <span class="res-score">${m.score1}–${m.score2}</span>
        <div class="mts" style="flex:1">
          <span class="fl">${getFlag(m.team2)}</span>
          <span class="tn ${w1?'dim':''}" style="${w2?'font-weight:700':''}">${m.team2}</span>
        </div>
        ${isClash?`<span class="chip chip-clash">⚔</span>`:''}
      </div>`;
      if(o1||o2)h+=`<div class="or">${o1?`<span class="ot2">${getFlag(m.team1)} ${o1} ${w1?'+3':m.score1===m.score2?'+1':'0'}pts</span>`:''} ${o2?`<span class="ot2">${getFlag(m.team2)} ${o2} ${w2?'+3':m.score1===m.score2?'+1':'0'}pts</span>`:''}</div>`;
    }
    h+=`</div>`;

  document.getElementById('tab-results').innerHTML=h;
}

  const played=allMatches.filter(m=>m.status==='finished').length;
  const clashes=allMatches.filter(m=>{const o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;}).length;

  let h=statusBar();
  h+=`<div class="sr">
    <div class="sx"><div class="sn">${played}</div><div class="sl2">Played</div></div>
    <div class="sx"><div class="sn">${allMatches.length}</div><div class="sl2">Total</div></div>
    <div class="sx"><div class="sn ac">${clashes}</div><div class="sl2">Clashes</div></div>
  </div>`;

  // Points explainer
  h+=`<div class="explainer" onclick="toggleExplainer()">
    <span>ℹ️ How are points calculated?</span>
    <span id="exp-arrow">▼</span>
  </div>
  <div class="explainer-body ${explainerOpen?'open':''}" id="explainer-body">
    Win = 3pts · Draw = 1pt each · Loss = 0pts. Points accumulate across all your assigned teams throughout the tournament.
  </div>`;

  h+=`<div class="sl" style="margin-bottom:8px">Standings</div><div class="card">`;
  const medals=['🥇','🥈','🥉'];
  if(played===0){
    for(const e of SWEEPSTAKE){
      h+=`<div class="lr"><div class="li"><div class="ln">${e.owner}</div><div class="lt">${e.teams.map(t=>`<span class="ltt">${getFlag(t)} ${t}</span>`).join('')}</div></div></div>`;
    }
    h+=`</div><div style="padding:12px 14px;font-size:12px;color:var(--muted);text-align:center">Leaderboard unlocks when matches kick off</div>`;
  } else {
    for(let i=0;i<ranked.length;i++){
      const r=ranked[i];
      const medal=i<3?medals[i]:`<span style="font-size:11px;color:var(--faint);font-weight:700">${i+1}</span>`;
      h+=`<div class="lr"><div class="lrk">${medal}</div><div class="li">
        <div class="ln">${r.owner}</div>
        <div class="lrec">${r.wins}W · ${r.draws}D · ${r.losses}L</div>
        <div class="lt">${r.teams.map(t=>`<span class="ltt ${r.elim[t]?'out':''}">${getFlag(t)} ${t}</span>`).join('')}</div>
      </div><span class="lp2">${r.pts}pts</span></div>`;
    }
  }
  h+=`</div>`;
  document.getElementById('tab-leaderboard').innerHTML=h;
}

function toggleExplainer(){
  explainerOpen=!explainerOpen;
  const body=document.getElementById('explainer-body');
  const arrow=document.getElementById('exp-arrow');
  if(body){body.classList.toggle('open',explainerOpen);}
  if(arrow){arrow.textContent=explainerOpen?'▲':'▼';}
}

function setTone(t){activeTone=t;renderBulletin();}

function generateBulletin(){
  const today=todayStr();
  const ranked=calcLeaderboard();
  const todayMs=allMatches.filter(m=>m.date===today);
  const recentMs=allMatches.filter(m=>m.status==='finished').slice(-6);
  const top=ranked[0];
  const clashesToday=todayMs.filter(m=>{const o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;});
  const matchList=todayMs.map(m=>`${getFlag(m.team1)} ${m.team1} vs ${m.team2} ${getFlag(m.team2)}`).join('\n');
  const recentList=recentMs.map(m=>`${m.team1} ${m.score1}–${m.score2} ${m.team2}`).join(' · ');
  const gen={
    banter:()=>{const intros=['Good morning QFP! ☕⚽ Another day, another chance to destroy your colleagues\' dreams.','Rise and shine, Quite Frankly fam! The World Cup waits for no one.','Morning all! 👋 Your daily sweepstake bulletin has arrived.'];const outros=['May the odds be ever in your favour. Or not. 🏆','Right then. Let\'s have it. ⚽🔥','Good luck everyone. 😅'];const clashLines=['Someone\'s getting the silent treatment at lunch 😶','HR has been notified 😅','One of them is buying the next round 🍺','Avoid eye contact in the corridor 👀','This one\'s going to make the Monday meeting very awkward 😬'];let msg=pick(intros)+'\n\n';if(todayMs.length)msg+=`📅 *Today\'s matches:*\n${matchList}\n\n`;else msg+=`📅 No matches today.\n\n`;if(clashesToday.length){msg+=`⚔️ *QFP Clash:*\n`;let ci=0;for(const m of clashesToday){msg+=`${getOwner(m.team1)} vs ${getOwner(m.team2)} — ${clashLines[ci%clashLines.length]}\n`;ci++;}msg+='\n';}if(recentMs.length)msg+=`📊 *Recent results:* ${recentList}\n\n`;msg+=`🏅 *Leaderboard:* ${top.owner} leads on ${top.pts}pts\n\n${pick(outros)}`;return msg;},
    pundit:()=>{let msg=`*QFP World Cup Bulletin* ⚽\n\n`;if(todayMs.length)msg+=`*Today\'s fixtures:*\n${matchList}\n\n`;else msg+=`No fixtures today. A day to reflect.\n\n`;if(clashesToday.length){const m=clashesToday[0];msg+=`*The standout clash:* ${getOwner(m.team1)} versus ${getOwner(m.team2)} — ${m.team1} against ${m.team2}. One of them will be very quiet in the office tomorrow. The other will not stop talking about it.\n\n`;}if(recentMs.length)msg+=`*Recent results:* ${recentList}\n\n`;msg+=`*Standings:* ${top.owner} leads on ${top.pts} points.`;return msg;},
    hype:()=>{let msg=`🚨🚨 QFP WORLD CUP UPDATE 🚨🚨\n\n`;if(todayMs.length)msg+=`TODAY\'S MATCHES:\n${matchList}\n\nTHIS IS MASSIVE.\n\n`;else msg+=`No matches today but THE TENSION IS BUILDING!!! 😤\n\n`;if(clashesToday.length){const hypePhrases=['DO NOT SIT NEXT TO EACH OTHER!!!','SOMEONE IS GETTING BLOCKED ON SLACK!!!','THE TENSION IS UNBEARABLE!!!','ONE OF THEM IS GOING HOME!!!'];let hi=0;msg+=`⚔️ COLLEAGUE CLASH!!! ⚔️\n`;for(const m of clashesToday){msg+=`${getOwner(m.team1).toUpperCase()} VS ${getOwner(m.team2).toUpperCase()}!!! ${hypePhrases[hi%hypePhrases.length]}\n`;hi++;}msg+='\n';}if(recentMs.length)msg+=`RECENT RESULTS: ${recentList}\n\n`;msg+=`LEADERBOARD: ${top.owner} ON ${top.pts}PTS!!! 🏆🔥`;return msg;},
    chaos:()=>{const intros=['Good morning. The World Cup is happening. Are we okay with this?','Another day, another football. I have eaten breakfast. The sweepstake continues.','Football update: the ball is still round. Everything is fine.'];let msg=pick(intros)+'\n\n';if(todayMs.length)msg+=`Matches today (allegedly):\n${matchList}\n\nWill these be good? Statistics suggest: possibly.\n\n`;if(clashesToday.length){const m=clashesToday[0];msg+=`${getOwner(m.team1)} and ${getOwner(m.team2)} are playing each other which is either very exciting or completely irrelevant. It is both.\n\n`;}if(recentMs.length)msg+=`Things that happened: ${recentList}. These are facts.\n\n`;msg+=`${top.owner} leads the sweepstake. This may or may not continue. Good luck everyone.`;return msg;}
  };
  generatedBulletin=gen[activeTone]();
  const el=document.getElementById('bb');
  if(el){el.classList.remove('ph');el.textContent=generatedBulletin;}
}

function generateWeekend(){
  const today=new Date();
  const day=today.getDay();
  const daysToSat=day===6?0:(6-day);
  const sat=new Date(today);sat.setDate(today.getDate()+daysToSat);
  const sun=new Date(today);sun.setDate(today.getDate()+daysToSat+1);
  const fmt=d=>d.toISOString().split('T')[0];
  const weekendDates=day===5?[fmt(today),fmt(sat),fmt(sun)]:[fmt(sat),fmt(sun)];
  const weekendMs=allMatches.filter(m=>weekendDates.includes(m.date));
  const ranked=calcLeaderboard();
  const top3=ranked.slice(0,3).map((r,i)=>['🥇','🥈','🥉'][i]+' '+r.owner+' '+r.pts+'pts').join(' · ');
  const clashes=weekendMs.filter(m=>{const o1=getOwner(m.team1),o2=getOwner(m.team2);return o1&&o2&&o1!==o2;});
  const dayName=d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  if(!weekendMs.length){generatedBulletin='No matches this weekend!';const el=document.getElementById('bb');if(el){el.classList.remove('ph');el.textContent=generatedBulletin;}return;}
  const byDate={};for(const m of weekendMs){if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);}
  const parts=['🗓️ *QFP Weekend Preview*','','Here is everything happening this weekend — enjoy yours! ⚽',''];
  for(const date of Object.keys(byDate).sort()){
    parts.push('*'+dayName(date)+'*');
    for(const m of byDate[date]){
      const o1=getOwner(m.team1),o2=getOwner(m.team2);
      const isClash=o1&&o2&&o1!==o2;
      const timeStr=m.utcDate?localTime(m.utcDate):'TBC';
      const clashStr=isClash?' ⚔️ '+o1+' vs '+o2:'';
      parts.push(getFlag(m.team1)+' '+m.team1+' vs '+m.team2+' '+getFlag(m.team2)+' — '+timeStr+clashStr);
    }
    parts.push('');
  }
  if(clashes.length){parts.push('⚔️ *Weekend clashes:* '+clashes.map(m=>getOwner(m.team1)+' vs '+getOwner(m.team2)).join(', '));parts.push('');}
  parts.push('🏅 *Current leaderboard:* '+top3);
  parts.push('');
  parts.push('Have a great weekend everyone — see you Monday! 🙌');
  generatedBulletin=parts.join('\n');
  const el=document.getElementById('bb');if(el){el.classList.remove('ph');el.textContent=generatedBulletin;}
}

function copyBulletin(){
  if(!generatedBulletin)return;
  navigator.clipboard.writeText(generatedBulletin).then(()=>{
    const btn=document.getElementById('cb');btn.textContent='✅ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy',2500);
  });
}

// ── TABS ───────────────────────────────────────────────────────────────────
function showTab(id,btn){
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');
  document.querySelectorAll('.tb').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).style.display='';btn.classList.add('active');
  if(id==='sweeps')renderSweeps();
  if(id==='fixtures')renderFixtures();
  if(id==='knockout')renderKnockout();
  if(id==='results')renderResults();
  if(id==='leaderboard')renderLeaderboard();
  if(id==='bulletin')renderBulletin();
}

async function refreshAll(){
  const spin=document.getElementById('spin');spin.classList.add('go');
  await fetchMatches();
  const active=document.querySelector('.tb.active').textContent.toLowerCase();
  if(active.includes('sweep'))renderSweeps();
  else if(active.includes('fix'))renderFixtures();
  else if(active.includes('knock'))renderKnockout();
  else if(active.includes('result'))renderResults();
  else if(active.includes('leader'))renderLeaderboard();
  else if(active.includes('bull'))renderBulletin();
  spin.classList.remove('go');
}

async function init(){
  // Show hardcoded data IMMEDIATELY - don't wait for API
  allMatches=JSON.parse(JSON.stringify(BASE_MATCHES));
  lastRefreshed=new Date();
  renderSweeps();
  // Then try API in background
  fetchMatches().then(()=>{
    const active=document.querySelector('.tb.active');
    if(!active)return;
    const tab=active.textContent.toLowerCase();
    if(tab.includes('sweep'))renderSweeps();
    else if(tab.includes('fix'))renderFixtures();
    else if(tab.includes('knock'))renderKnockout();
    else if(tab.includes('result'))renderResults();
    else if(tab.includes('leader'))renderLeaderboard();
  }).catch(()=>{});
  setInterval(refreshAll,90000);
}
